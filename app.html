<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>好名有解</title><style>body{margin:0;background:#f3f0e8;color:#1d2922;font-family:"PingFang SC","Microsoft YaHei",sans-serif}.w{max-width:980px;margin:auto;padding:22px}.hero,.box,.card{background:#fffdf8;border:1px solid #ded7c9;border-radius:20px}.hero{padding:28px;margin-bottom:16px}.hero h1{margin:0 0 8px;font:700 30px serif}.hero p{margin:0;color:#69736d}.box{padding:22px}.step{color:#a37d47;font-size:12px;font-weight:700;letter-spacing:.12em}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}label{display:block;font-size:13px;font-weight:700;margin:12px 0 6px}input,select{width:100%;box-sizing:border-box;padding:11px;border:1px solid #d8d1c4;border-radius:10px}.btn{border:0;border-radius:11px;padding:12px 16px;background:#294f3f;color:#fff;font-weight:700;cursor:pointer}.ghost{background:#fff;color:#294f3f;border:1px solid #cfc8bb}.pairs,.cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}.pair,.card{padding:18px}.pair button{width:100%;margin-top:8px;padding:12px;border:1px solid #d7d0c4;border-radius:10px;background:#fff;cursor:pointer}.name{font:700 26px serif}.meta{color:#748078;font-size:12px;margin:4px 0 10px}.tag{display:inline-block;background:#f1eee7;border-radius:99px;padding:5px 8px;font-size:11px;margin:0 5px 5px 0}.desc{font-size:14px;line-height:1.65}.actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}.actions button{border:1px solid #d8d1c4;background:#fff;border-radius:8px;padding:7px 9px;cursor:pointer}.actions .like{background:#294f3f;color:#fff}.hide{display:none}.summary{margin:12px 0;color:#647068}.topline{display:flex;justify-content:space-between;align-items:center}@media(max-width:720px){.row,.pairs,.cards{grid-template-columns:1fr}}</style></head><body><div class="w"><section class="hero"><h1>好名有解</h1><p>先理解你的审美，再推荐名字；每次反馈都会改变下一轮结果。</p></section><section id="s1" class="box"><span class="step">第一步 · 基础信息</span><div class="row"><div><label>宝宝姓氏</label><input id="surname" value="林" maxlength="2"></div><div><label>性别倾向</label><select id="gender"><option value="neutral">中性</option><option value="boy">男孩</option><option value="girl">女孩</option></select></div></div><label>你更在意什么</label><select id="focus"><option value="耐听">耐听、不过时</option><option value="文化">文化出处</option><option value="小众">小众但不生僻</option><option value="简洁">简单易写</option></select><button class="btn" style="margin-top:16px" onclick="startTest()">开始审美测试</button></section><section id="s2" class="box hide"><div class="topline"><span class="step">第二步 · 审美测试</span><span id="progress"></span></div><p class="summary">每组选择你更愿意真正给孩子使用的名字。</p><div id="pair" class="pairs"></div></section><section id="s3" class="box hide"><div class="topline"><div><span class="step">第三步 · 第一轮推荐</span><h2 id="title"></h2></div><button class="btn ghost" onclick="rerank()">根据反馈再推荐</button></div><p id="taste" class="summary"></p><div id="cards" class="cards"></div></section></div><script>const data=[
{n:'知远',g:'neutral',style:'温润',traits:['耐听','文化','稳重'],p:'zhī yuǎn',d:'见识通达、目光长远，稳重但不老气。'},
{n:'清和',g:'neutral',style:'清雅',traits:['耐听','文化','简洁'],p:'qīng hé',d:'清正温和，读音舒展自然，适合不同年龄。'},
{n:'昭宁',g:'neutral',style:'明朗',traits:['耐听','文化','小众'],p:'zhāo níng',d:'光明安宁，清亮克制，男女皆可。'},
{n:'景澄',g:'neutral',style:'清朗',traits:['小众','文化','耐听'],p:'jǐng chéng',d:'景明心澄，画面干净，读音沉静。'},
{n:'怀谦',g:'boy',style:'儒雅',traits:['耐听','文化','稳重'],p:'huái qiān',d:'有胸怀，也懂谦逊，成熟而不沉闷。'},
{n:'允修',g:'boy',style:'克制',traits:['小众','文化','稳重'],p:'yǔn xiū',d:'诚信自持、持续修养，内敛有力量。'},
{n:'景川',g:'boy',style:'开阔',traits:['耐听','自然','简洁'],p:'jǐng chuān',d:'景致开阔、山川舒展，明朗有力量。'},
{n:'知衡',g:'boy',style:'理性',traits:['耐听','稳重','文化'],p:'zhī héng',d:'有见识，也懂权衡，成年后依然正式。'},
{n:'予宁',g:'girl',style:'温柔',traits:['耐听','简洁','平安'],p:'yǔ níng',d:'温柔安定，简洁好记，不甜腻。'},
{n:'清禾',g:'girl',style:'自然',traits:['简洁','自然','耐听'],p:'qīng hé',d:'清澈如禾，生命力温和，简单易写。'},
{n:'月澄',g:'girl',style:'诗意',traits:['小众','文化','自然'],p:'yuè chéng',d:'月色澄明，画面感强，柔和不俗气。'},
{n:'初宁',g:'girl',style:'现代',traits:['简洁','耐听','平安'],p:'chū níng',d:'初心安宁，干净自然，童年与成年都适用。'},
{n:'砚川',g:'boy',style:'书卷',traits:['小众','文化','自然'],p:'yàn chuān',d:'书卷气与山川感结合，疏朗有辨识度。'},
{n:'清晏',g:'neutral',style:'古典',traits:['小众','文化','耐听'],p:'qīng yàn',d:'清明安宁，古典但不拗口。'},
{n:'予安',g:'neutral',style:'温柔',traits:['简洁','平安','耐听'],p:'yǔ ān',d:'给予平安，亲切自然，日常称呼舒服。'},
{n:'叙川',g:'neutral',style:'现代',traits:['小众','自然','简洁'],p:'xù chuān',d:'有表达、有秩序，也有山川般的开阔感。'}];
const tests=[['知远','宇宸'],['清和','砚川'],['昭宁','修远'],['景澄','子轩'],['予安','清晏']];let ti=0,prefs={},feedback={};const $=s=>document.querySelector(s);function startTest(){$('#s1').classList.add('hide');$('#s2').classList.remove('hide');showTest()}function showTest(){if(ti>=tests.length)return finishTest();$('#progress').textContent=`${ti+1}/${tests.length}`;let [a,b]=tests[ti];$('#pair').innerHTML=`<div class="pair"><div class="name">${a}</div><button onclick="choose('${a}')">更喜欢这个</button></div><div class="pair"><div class="name">${b}</div><button onclick="choose('${b}')">更喜欢这个</button></div>`}function choose(n){let x=data.find(d=>d.n===n);if(x)x.traits.forEach(t=>prefs[t]=(prefs[t]||0)+1);else prefs['大众']=(prefs['大众']||0)+1;ti++;showTest()}function finishTest(){$('#s2').classList.add('hide');$('#s3').classList.remove('hide');render()}function score(x){let g=$('#gender').value,f=$('#focus').value,s=0;if(g==='neutral'||x.g==='neutral'||x.g===g)s+=8;else s-=20;x.traits.forEach(t=>s+=(prefs[t]||0)*3+(feedback[t]||0)*4);if(x.traits.includes(f))s+=10;return s+Math.random()*2}function render(){let s=$('#surname').value.trim()||'林',arr=data.filter(x=>$('#gender').value==='neutral'||x.g==='neutral'||x.g===$('#gender').value).sort((a,b)=>score(b)-score(a)).slice(0,6);$('#title').textContent=`为“${s}”姓推荐的名字`;let top=Object.entries(prefs).sort((a,b)=>b[1]-a[1]).slice(0,3).map(x=>x[0]).join('、');$('#taste').textContent=`当前识别到的偏好：${top||'耐听、自然'}。下面结果会随着你的反馈继续变化。`;$('#cards').innerHTML=arr.map(x=>`<article class="card"><div class="name">${s}${x.n}</div><div class="meta">${x.p} · ${x.style}</div>${x.traits.map(t=>`<span class="tag">${t}</span>`).join('')}<div class="desc">${x.d}</div><div class="actions"><button class="like" onclick="fb('${x.n}','like')">喜欢</button><button onclick="fb('${x.n}','太普通')">太普通</button><button onclick="fb('${x.n}','太古风')">太古风</button><button onclick="fb('${x.n}','不好听')">不好听</button><button onclick="fb('${x.n}','字复杂')">字复杂</button></div></article>`).join('')}function fb(n,type){let x=data.find(d=>d.n===n);if(!x)return;if(type==='like')x.traits.forEach(t=>feedback[t]=(feedback[t]||0)+2);if(type==='太普通')feedback['小众']=(feedback['小众']||0)+2;if(type==='太古风')feedback['简洁']=(feedback['简洁']||0)+2;if(type==='不好听')feedback['耐听']=(feedback['耐听']||0)+2;if(type==='字复杂')feedback['简洁']=(feedback['简洁']||0)+3;alert('已记录，点击“根据反馈再推荐”查看下一轮。')}function rerank(){render();window.scrollTo({top:0,behavior:'smooth'})}</script></body></html>
