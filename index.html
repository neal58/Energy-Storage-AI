<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>好名有解｜动态宝宝取名</title>
<style>
*{box-sizing:border-box}:root{--bg:#f4f0e8;--card:#fffdf8;--ink:#1d2923;--muted:#68736d;--green:#244d3b;--gold:#9e7440;--line:#ddd4c5}body{margin:0;background:var(--bg);color:var(--ink);font-family:"PingFang SC","Microsoft YaHei",sans-serif}.wrap{max-width:1180px;margin:auto;padding:18px}header,.form-card,.summary,article,.empty{background:var(--card);border:1px solid var(--line);border-radius:20px}header{padding:28px 32px;margin-bottom:16px;background:linear-gradient(135deg,#fffdf8,#e6eee8)}header h1{font:700 34px/1.2 "Songti SC",serif;margin:8px 0}header p{margin:0;color:var(--muted);line-height:1.7}.eyebrow,.category{font-size:12px;color:var(--gold);font-weight:800;letter-spacing:.08em}.form-card{padding:20px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}label{font-size:13px;font-weight:700;display:flex;flex-direction:column;gap:6px}input,select{width:100%;border:1px solid #d3cab9;background:#fff;border-radius:10px;padding:10px;color:var(--ink)}label.check{flex-direction:row;align-items:center;padding-top:25px;font-weight:500}label.check input{width:auto}button{border:0;border-radius:10px;padding:12px 18px;margin-top:16px;background:var(--green);color:#fff;font-weight:800;cursor:pointer}.secondary{background:#fff;color:var(--green);border:1px solid var(--green);margin-left:8px}.summary{display:flex;gap:12px;align-items:center;flex-wrap:wrap;padding:15px 18px;margin:14px 0;color:var(--muted);font-size:13px}.summary b{color:var(--ink)}.summary em{font-style:normal;color:#9b5d36}.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}article{padding:19px}article h2{font:700 29px "Songti SC",serif;margin:6px 0 2px}.pinyin{font-size:12px;color:var(--muted);margin-bottom:11px}article p{line-height:1.7;margin:10px 0}dl{margin:0;padding-top:10px;border-top:1px dashed var(--line);display:grid;grid-template-columns:78px 1fr;gap:5px 8px;font-size:13px}dt{font-weight:800}dd{margin:0;color:var(--muted);line-height:1.55}.empty{padding:25px;text-align:center;color:var(--muted)}.privacy{font-size:12px;color:var(--muted);margin-top:12px}@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:650px){.wrap{padding:10px}header{padding:22px 18px}.grid,.cards{grid-template-columns:1fr}.secondary{margin-left:4px}label.check{padding-top:0}}
</style>
</head>
<body>
<div class="wrap">
<header><div class="eyebrow">动态取名引擎 · 单文件可用版</div><h1>好名有解</h1><p>父母姓氏、孩子姓氏方式、出生日期与时段、风格和避讳共同参与生成，不是从固定名单里挑。</p></header>
<main>
<section class="form-card">
<div class="grid">
<label>父亲姓氏<input id="father-surname" value="陈" maxlength="2"></label>
<label>母亲姓氏<input id="mother-surname" value="林" maxlength="2"></label>
<label>孩子姓氏<select id="surname-mode"><option value="father">随父姓</option><option value="mother">随母姓</option><option value="double">父母双姓</option></select></label>
<label>母姓参与<select id="maternal-mode"><option value="none">不参与名字</option><option value="symbolic" selected>意象纪念</option><option value="direct">直接作为名字首字</option></select></label>
<label>性别倾向<select id="gender"><option value="neutral">中性均可</option><option value="boy">男孩</option><option value="girl">女孩</option></select></label>
<label>名字长度<select id="name-length"><option value="2">双字名</option><option value="1">单字名</option></select></label>
<label>出生日期<input id="birth-date" type="date" value="2026-07-14"></label>
<label>出生时间<input id="birth-time" type="time" value="19:20"></label>
<label>出生地时区<select id="timezone"><option value="+08:00">中国 UTC+8</option><option value="+09:00" selected>印尼东部 UTC+9</option><option value="+07:00">印尼西部 UTC+7</option></select></label>
<label class="check"><input id="traditional-reference" type="checkbox" checked>启用季节与时辰传统参考</label>
<label>风格<select id="style"><option>温润</option><option>清朗</option><option>稳重</option><option>书卷</option><option>现代</option><option>简洁</option><option>自然</option><option>古典</option></select></label>
<label>核心寓意<select id="meaning"><option>智慧</option><option>品格</option><option>志向</option><option>平安</option><option>光明</option><option>成长</option><option>从容</option><option>责任</option></select></label>
<label>指定字<input id="required-char" maxlength="1" placeholder="可选"></label>
<label>避开字<input id="avoid-chars" placeholder="如：梓轩"></label>
<label>家庭避讳词<input id="custom-taboos" placeholder="用逗号分隔"></label>
<label class="check"><input id="avoid-trend" type="checkbox" checked>降低高频网红字权重</label>
</div>
<button id="generate">生成专属名字</button><button id="refresh" class="secondary">换一批</button>
<div class="privacy">所有信息只在当前浏览器内计算，不上传。</div>
</section>
<section id="birth-summary" class="summary"></section>
<section id="recommendations" class="cards"></section>
</main>
</div>
<script>
(function(){
'use strict';
const $=id=>document.getElementById(id);
const S={陈:['chén',2],林:['lín',2],王:['wáng',2],李:['lǐ',3],张:['zhāng',1],刘:['liú',2],杨:['yáng',2],黄:['huáng',2],赵:['zhào',4],周:['zhōu',1],吴:['wú',2],徐:['xú',2],孙:['sūn',1],胡:['hú',2],朱:['zhū',1],高:['gāo',1],何:['hé',2],郭:['guō',1],罗:['luó',2],梁:['liáng',2],宋:['sòng',4],郑:['zhèng',4],谢:['xiè',4],韩:['hán',2],唐:['táng',2],沈:['shěn',3],苏:['sū',1],江:['jiāng',1]};
const M={林:['生长','清润','自然'],江:['开阔','流动','清朗'],周:['周全','秩序','稳重'],杨:['生长','向上'],李:['成长','丰实'],王:['担当','稳重'],陈:['沉静','积淀'],苏:['舒展','清雅'],沈:['沉静','深远']};
const C={
知:['zhī',1,'neutral',['智慧','明理'],['书卷','现代'],['明晰','进取']],思:['sī',1,'neutral',['智慧','思考'],['书卷','温润'],['沉静','明晰']],怀:['huái',2,'boy',['胸怀','品格'],['温润','稳重'],['温和','安定']],修:['xiū',1,'boy',['修养','成长'],['古典','稳重'],['进取','坚定']],守:['shǒu',3,'boy',['坚守','责任'],['稳重','简洁'],['坚定','安定']],嘉:['jiā',1,'neutral',['美好','品格'],['温润','古典'],['和煦','丰实']],清:['qīng',1,'neutral',['清正','清澈'],['清雅','清朗'],['清润','澄澈']],明:['míng',2,'neutral',['光明','智慧'],['清朗','简洁'],['明朗','晨光','明晰']],安:['ān',1,'neutral',['平安','从容'],['温润','简洁'],['安宁','安定','沉静']],景:['jǐng',3,'neutral',['光景','开阔'],['清朗','古典'],['明朗','开阔','晨光']],书:['shū',1,'neutral',['学识','智慧'],['书卷','现代'],['沉静','明晰']],承:['chéng',2,'boy',['担当','传承'],['稳重','温润'],['坚定','成长']],若:['ruò',4,'girl',['温和','从容'],['温润','现代'],['和煦','舒展']],静:['jìng',4,'girl',['沉静','品格'],['端庄','温润'],['沉静','安宁']],舒:['shū',1,'girl',['舒展','从容'],['温润','简洁'],['舒展','温和']],昭:['zhāo',1,'neutral',['光明','明朗'],['古典','清朗'],['晨光','明朗']],谨:['jǐn',3,'neutral',['谨慎','品格'],['稳重','书卷'],['秩序','沉静']],弘:['hóng',2,'boy',['宏大','志向'],['稳重','古典'],['开阔','进取']],云:['yún',2,'neutral',['自在','开阔'],['自然','温润'],['舒展','流动']],禾:['hé',2,'neutral',['成长','丰收'],['自然','简洁'],['生长','收获']],松:['sōng',1,'boy',['坚韧','品格'],['自然','古典'],['坚韧','坚定']],竹:['zhú',2,'neutral',['正直','成长'],['自然','古典'],['生长','清润']],言:['yán',2,'neutral',['表达','诚信'],['书卷','现代'],['明晰','秩序']],予:['yǔ',3,'girl',['给予','温和'],['现代','温润'],['温和','舒展']],和:['hé',2,'neutral',['温和','和谐'],['温润','简洁'],['和煦','安宁']],宁:['níng',2,'neutral',['安宁','从容'],['温润','简洁'],['安宁','沉静']],初:['chū',1,'girl',['初心','开始'],['现代','清朗'],['初始','晨光']],朝:['zhāo',1,'neutral',['朝气','希望'],['清朗','自然'],['晨光','初始']],晏:['yàn',4,'neutral',['安宁','平和'],['古典','温润'],['安宁','收束']],澄:['chéng',2,'neutral',['澄澈','清明'],['清朗','自然'],['澄澈','清润']],远:['yuǎn',3,'boy',['志向','远见'],['稳重','书卷'],['深远','进取']],齐:['qí',2,'neutral',['向善','进取'],['书卷','古典'],['进取','秩序']],谦:['qiān',1,'boy',['谦逊','品格'],['温润','稳重'],['温和','秩序']],正:['zhèng',4,'boy',['正直','原则'],['稳重','简洁'],['坚定','秩序']],哲:['zhé',2,'neutral',['智慧','明理'],['稳重','书卷'],['明晰','沉静']],毅:['yì',4,'boy',['坚毅','志向'],['稳重','简洁'],['坚韧','坚定']],礼:['lǐ',3,'neutral',['礼度','品格'],['稳重','古典'],['秩序','温和']],仪:['yí',2,'girl',['仪度','品格'],['端庄','书卷'],['秩序','温和']],衡:['héng',2,'boy',['权衡','判断'],['现代','稳重'],['明晰','秩序']],成:['chéng',2,'neutral',['成就','成长'],['简洁','稳重'],['成长','收获']],然:['rán',2,'neutral',['自然','从容'],['现代','简洁'],['舒展','安定']],宜:['yí',2,'girl',['得体','安适'],['端庄','稳重'],['安宁','秩序']],朗:['lǎng',3,'boy',['明朗','开阔'],['清朗','简洁'],['明朗','开阔']],乔:['qiáo',2,'girl',['高远','成长'],['自然','诗意'],['生长','开阔']],川:['chuān',1,'neutral',['开阔','流动'],['自然','现代'],['流动','开阔']],真:['zhēn',1,'neutral',['真诚','品格'],['简洁','现代'],['明晰','坚定']],善:['shàn',4,'neutral',['善良','向善'],['温润','古典'],['温和','和煦']],卓:['zhuó',2,'boy',['卓越','进取'],['现代','稳重'],['进取','开阔']],达:['dá',2,'boy',['通达','成就'],['稳重','简洁'],['进取','明晰']],新:['xīn',1,'neutral',['新生','成长'],['现代','简洁'],['初始','生长']],舟:['zhōu',1,'neutral',['行进','方向'],['自然','现代'],['流动','进取']],山:['shān',1,'boy',['坚定','稳重'],['自然','简洁'],['坚韧','开阔']]
};
const P={知:['远','齐','谦','衡','哲','礼','成','朗'],思:['远','齐','哲','成','宁','然','善','新'],怀:['谦','远','安','宁','礼','善','真','毅'],修:['远','齐','正','毅','成','礼','善','然'],守:['正','礼','安','成','真','远'],嘉:['言','禾','宁','礼','仪','善','成','宜'],清:['和','宁','远','朗','澄','宜','言','正'],明:['远','哲','谦','朗','礼','成','澄','正'],安:['和','宁','然','礼','宜','远','澄','成'],景:['明','澄','远','朗','川','和','宁','成'],书:['远','衡','宁','仪','言','礼','成','然'],承:['安','礼','远','毅','成','正','和','宁'],若:['宁','安','宜','和','然','清','仪','乔'],静:['宜','宁','安','仪','和','然','清'],舒:['宁','然','和','宜','朗','远','清','仪'],昭:['宁','明','远','和','澄','朗','宜','成'],谨:['言','礼','正','安','和','真','善'],弘:['毅','远','正','达','成','礼','哲','朗'],云:['舒','宁','朗','远','川','舟','澄','和'],禾:['宁','安','宜','川','新','成','和','朗'],松:['毅','远','正','安','成','朗','山','川'],竹:['清','宁','安','和','远','宜','成','朗'],言:['真','善','远','成','宁','和','礼','哲'],予:['安','宁','和','然','宜','清','善','新'],和:['宁','安','宜','远','成','朗','真','善'],宁:['安','和','远','成','宜','朗','澄','然'],初:['宁','安','和','朗','新','远','宜','澄'],朝:['远','朗','明','新','成','宁','舟','川']};
const DIRECT={林:['安','宁','和','清','远','宜','澄','然'],江:['宁','远','清','和','澄','舟','朗','安'],苏:['宁','和','清','宜','远','然','安','仪'],沈:['宁','安','澄','远','和','清','然','哲']};
let seed=0;
function hash(s){let h=2166136261+seed;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return(h>>>0)/4294967295}
function season(month){return[3,4,5].includes(month)?['生长','清润','和煦']:[6,7,8].includes(month)?['明朗','充沛','开阔']:[9,10,11].includes(month)?['澄澈','收获','坚定']:['沉静','安定','坚韧','深远']}
function period(hour){return hour>=5&&hour<9?['晨光','初始','明朗']:hour>=9&&hour<17?['开阔','进取','明晰']:hour>=17&&hour<21?['温和','安宁','收束']:['沉静','清澈','安定']}
function selectedSurname(){return $('surname-mode').value==='mother'?$('mother-surname').value.trim():$('surname-mode').value==='double'?$('father-surname').value.trim()+$('mother-surname').value.trim():$('father-surname').value.trim()}
function fact(ch){return C[ch]||[ch,2,'neutral',[ch],['自然'],[]]}
function generate(){
 const surname=selectedSurname()||'陈',mother=$('mother-surname').value.trim(),mode=$('maternal-mode').value,gender=$('gender').value,length=+$('name-length').value;
 const date=$('birth-date').value,time=$('birth-time').value; const month=date?+date.split('-')[1]:1,hour=time?+time.split(':')[0]:12;
 const btags=$('traditional-reference').checked?[...season(month),...period(hour)]:[]; const mtags=mode==='symbolic'?(M[mother]||[]):[];
 const style=$('style').value,meaning=$('meaning').value,required=$('required-char').value.trim(),avoid=new Set([...$('avoid-chars').value]);
 const taboos=$('custom-taboos').value.split(/[，,\s]+/).filter(Boolean),tone=(S[surname]||S[surname[0]]||['',0])[1],spinyin=(S[surname]||S[surname[0]]||['',0])[0];
 let rows=[];
 function add(a,b){
  const name=a+(b||''),full=surname+name;if(required&&!name.includes(required))return;if([...name].some(x=>avoid.has(x)))return;if(taboos.some(x=>full.includes(x)))return;
  const fa=fact(a),fb=b?fact(b):null;if(gender!=='neutral'&&fa[2]!=='neutral'&&fa[2]!==gender)return;if(fb&&gender!=='neutral'&&fb[2]!=='neutral'&&fb[2]!==gender)return;
  const tones=[tone,fa[1],...(fb?[fb[1]]:[])].filter(Boolean);if(tones.length===3&&new Set(tones).size===1)return;
  if(spinyin&&spinyin.normalize('NFD').replace(/[\u0300-\u036f]/g,'')===fa[0].normalize('NFD').replace(/[\u0300-\u036f]/g,''))return;
  let score=60+hash(full)*7;const fs=[fa,...(fb?[fb]:[])];
  for(const f of fs){if(f[3].includes(meaning))score+=13;if(f[4].includes(style))score+=11;score+=f[5].filter(x=>btags.includes(x)).length*3;score+=f[3].filter(x=>mtags.includes(x)).length*2;}
  for(let i=1;i<tones.length;i++)if(tones[i]===tones[i-1])score-=6;
  if($('avoid-trend').checked&&[...name].some(x=>'梓宸轩辰诺涵睿熙泽宇'.includes(x)))score-=12;
  rows.push({name,full,pinyin:[spinyin,fa[0],...(fb?[fb[0]]:[])].filter(Boolean).join(' · '),score,meaning:fa[3][0]+(fb?'，并延伸到'+fb[3][0]:''),birth:fs.flatMap(f=>f[5].filter(x=>btags.includes(x))),maternal:fs.flatMap(f=>f[3].filter(x=>mtags.includes(x))),sound:tones.length>1?'声调有起伏，已避开明显同音与全名同调':'姓氏拼音未收录，建议家庭自行多读几遍'});
 }
 if(mode==='direct'){
   const arr=DIRECT[mother]||[];
   if(length===1&&C[mother])add(mother);else for(const b of arr)add(mother,b);
 }else if(length===1){for(const ch of Object.keys(C))add(ch)}else{for(const a of Object.keys(P))for(const b of P[a])add(a,b)}
 rows.sort((x,y)=>y.score-x.score);const seen=new Set(),out=[];for(const r of rows){if(seen.has(r.name[0])&&rows.length>20)continue;seen.add(r.name[0]);out.push(r);if(out.length===8)break}
 $('birth-summary').innerHTML='<b>'+surname+'姓 · 本次动态条件</b><span>季节：'+season(month).join('、')+'</span><span>时段：'+period(hour).join('、')+'</span><span>母姓纪念：'+(mtags.join('、')||'未启用')+'</span><span>时区：'+$('timezone').value+'</span>';
 const cats=['综合最贴合','稳妥耐用','小众自然','家庭纪念','出生意象','现代简洁','书卷文化','探索方向'];
 $('recommendations').innerHTML=out.length?out.map((r,i)=>'<article><div class="category">'+cats[i]+'</div><h2>'+r.full+'</h2><div class="pinyin">'+r.pinyin+'</div><p>'+r.meaning+'，整体表达清晰完整。</p><dl><dt>姓氏连读</dt><dd>'+r.sound+'</dd><dt>出生信息</dt><dd>'+(r.birth.length?[...new Set(r.birth)].join('、'):'本候选未直接触发特定出生意象')+'</dd><dt>母姓参与</dt><dd>'+(r.maternal.length?[...new Set(r.maternal)].join('、'):'未直接影响该候选')+'</dd><dt>出处</dt><dd>无直接可靠出处，按现代汉语语义关系与姓名习惯生成。</dd></dl></article>').join(''):'<div class="empty">当前条件没有合格结果。若选择“母姓直接入名”，说明该母姓暂不适合自然组合；请改用“意象纪念”或减少指定、避讳条件。</div>';
}
$('surname-mode').addEventListener('change',e=>{if(e.target.value==='double')$('name-length').value='1'});
$('generate').onclick=()=>{seed=0;generate()};$('refresh').onclick=()=>{seed++;generate()};generate();
})();
</script>
</body>
</html>
