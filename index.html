<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>好名有解｜宝宝取名</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/neal58/Energy-Storage-AI@9af2098806e25d73064608b43fe14669e8f8be8a/src/styles.css"></head><body><div class="wrap"><section class="hero"><div class="eyebrow">精品库版 · 不随机拼字</div><h1>好名有解</h1><p>从人工精选的现实姓名组合中筛选，再检查姓氏连读、声调、语义、时代感和成长适配。没有可靠出处时明确说明，不硬编诗词。</p></section><main class="layout"><aside class="panel"><h2>宝宝取名</h2><div class="hint">优先保证自然、顺口、能真正使用，宁缺毋滥。</div><label for="surname">宝宝姓氏</label><input id="surname" value="林" maxlength="2"><label for="gender">性别倾向</label><select id="gender"><option value="neutral">中性均可</option><option value="boy">男孩</option><option value="girl">女孩</option></select><div class="two"><div><label for="style">风格</label><select id="style"><option>温润</option><option>稳重</option><option>清雅</option><option>清朗</option><option>书卷</option><option>现代</option><option>简洁</option><option>自然</option><option>古典</option></select></div><div><label for="meaning">核心寓意</label><select id="meaning"><option>智慧</option><option>品格</option><option>志向</option><option>平安</option><option>光明</option><option>成长</option><option>从容</option><option>美好</option></select></div></div><label for="trend">独特程度</label><select id="trend"><option value="balanced">适度独特</option><option value="stable">稳妥耐看</option><option value="niche">小众但自然</option></select><div class="two"><div><label for="required">指定字</label><input id="required" maxlength="1" placeholder="可选"></div><div><label for="avoid">避开字</label><input id="avoid" placeholder="可选"></div></div><label class="check"><input type="checkbox" id="avoid-trend" checked>降低近年高频网红字权重</label><button id="generate" class="primary">生成名字方案</button><div class="method"><b>筛选顺序：</b><br>现实姓名自然度 → 姓氏连读与音律 → 语义完整性 → 成年适用性 → 书写与时代感 → 文化出处。</div></aside><section><div class="panel summary"><div><b id="surname-note-title">姓氏分析</b><p id="surname-note"></p></div><button id="refresh" class="secondary">换一批</button></div><div id="recommendations" class="cards"></div><section class="panel compare"><div class="summary"><div><b>名字对比</b><p>最多选择三个名字，比较自然度、音律和成长适配。</p></div><button id="clear-compare" class="secondary">清空</button></div><div id="compare" class="compare-grid"></div></section></section></main></div><script type="module" src="https://cdn.jsdelivr.net/gh/neal58/Energy-Storage-AI@9af2098806e25d73064608b43fe14669e8f8be8a/src/app.js"></script></body></html>
