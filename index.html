<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>好名有解｜宝宝取名专家版</title><link rel="stylesheet" href="./src/styles.css"></head><body><div class="wrap"><section class="hero"><h1>好名有解</h1><p>先淘汰不好听和不自然的名字，再谈寓意、出处与个性。</p></section><main class="layout"><aside class="panel"><h2>取名条件</h2><label for="surname">宝宝姓氏</label><input id="surname" value="林" maxlength="2"><label for="gender">性别倾向</label><select id="gender"><option value="neutral">中性</option><option value="boy">男孩</option><option value="girl">女孩</option></select><label for="style">风格偏好</label><select id="style"><option>温润</option><option>清朗</option><option>稳重</option><option>现代</option><option>古典</option><option>自然</option></select><label for="meaning">寓意偏好</label><select id="meaning"><option>智慧</option><option>志向</option><option>平安</option><option>品格</option><option>光明</option><option>自然</option></select><label for="required">指定字（可选）</label><input id="required" maxlength="1" placeholder="如：安"><label for="avoid">避开字（可选）</label><input id="avoid" placeholder="如：梓宸轩"><button id="generate" class="primary">生成名字方案</button></aside><section><div id="surname-note" class="panel note"></div><div id="recommendations" class="cards"></div><section class="panel compare"><div class="compare-head"><h2>名字对比</h2><button id="clear-compare" class="secondary">清空</button></div><div id="compare" class="compare-list"></div></section></section></main></div><script type="module" src="./src/app.js"></script></body></html>
