<div class="wrap">
<header>
  <div class="eyebrow">书籍与文献研究版 · 先立意，再取名</div>
  <h1>好名有解</h1>
  <p>以《左传》“信、义、象、假、类”五种命名方法为骨架，先理解家庭为什么取这个名字，再审查完整语义、姓氏读感、家族避讳和社会使用。</p>
</header>
<main>
<section class="form-card">
  <h2>一、家庭命名档案</h2>
  <div class="grid">
    <label>父亲姓氏<input id="father-surname" value="陈" maxlength="2"></label>
    <label>母亲姓氏<input id="mother-surname" value="林" maxlength="2"></label>
    <label>孩子姓氏<select id="surname-mode"><option value="father">随父姓</option><option value="mother">随母姓</option><option value="double">父母双姓</option></select><small id="name-length-note"></small></label>
    <label>母姓参与<select id="maternal-mode"><option value="none">不参与名字</option><option value="symbolic" selected>意象纪念</option><option value="direct">直接作为名字首字</option></select></label>
    <label>性别倾向<select id="gender"><option value="neutral">中性均可</option><option value="boy">男孩</option><option value="girl">女孩</option></select></label>
    <label>辈分字<input id="generation-char" maxlength="1" placeholder="可选"></label>
    <label>辈分字位置<select id="generation-position"><option value="either">任一位置</option><option value="first">名字首字</option><option value="second">名字末字</option></select></label>
    <label>长辈避讳字<input id="elder-taboo-chars" placeholder="如：明华"></label>
  </div>

  <h2>二、选择命名方法</h2>
  <div class="grid method-grid">
    <label>主要路线<select id="naming-method">
      <option value="yi" selected>义｜德行志向</option>
      <option value="xin">信｜出生纪念</option>
      <option value="xiang">象｜气质人格</option>
      <option value="jia">假｜自然意象</option>
      <option value="lei">类｜家族呼应</option>
    </select></label>
    <label class="wide">家庭命名立意<textarea id="family-wish" rows="2" placeholder="例如：希望孩子明理、自持、待人有分寸">希望孩子明理、自持、待人有分寸</textarea></label>
    <label>出生日期<input id="birth-date" type="date" value="2026-07-14"></label>
    <label>出生时间<input id="birth-time" type="time" value="19:20"></label>
    <label>出生地时区<select id="timezone"><option value="+08:00">中国 UTC+8</option><option value="+09:00" selected>印尼东部 UTC+9</option><option value="+07:00">印尼西部 UTC+7</option></select></label>
    <label class="check"><input id="traditional-reference" type="checkbox" checked>启用季节与时段纪念参考</label>
  </div>

  <h2>三、审美与现实约束</h2>
  <div class="grid">
    <label>审美方向<select id="style"><option selected>耐看自然</option><option>温润清雅</option><option>书卷文化</option><option>清朗明亮</option><option>大气稳重</option><option>现代轻盈</option><option>自然舒展</option><option>古典雅致</option></select></label>
    <label>核心寓意<select id="meaning"><option>智慧</option><option selected>品格</option><option>志向</option><option>平安</option><option>光明</option><option>成长</option><option>从容</option><option>责任</option></select></label>
    <label>指定字<input id="required-char" maxlength="1" placeholder="可选"></label>
    <label>避开字<input id="avoid-chars" placeholder="如：梓轩"></label>
    <label>家庭避讳词<input id="custom-taboos" placeholder="用逗号分隔"></label>
    <label class="check"><input id="avoid-trend" type="checkbox" checked>降低近年高频网红名权重</label>
  </div>
  <button id="generate">形成命名方案</button><button id="refresh" class="secondary">换一组</button>
  <div class="privacy">所有信息只在当前浏览器内计算。没有达到自然度与语义门槛时，系统会少给名字，不会凑数。</div>
</section>
<section id="naming-brief" class="brief"></section>
<section id="birth-summary" class="summary"></section>
<section id="recommendations" class="cards"></section>
</main>
</div>

  if(method==='yi')return`以德行与人生期待立意，重点表达${record.meanings?.join('、')||input.meaning}${wish?`，并回应家庭期待“${wish}”`:''}。`;
  if(method==='xiang')return`以人格气质立意，名字希望呈现${record.styles?.join('、')||input.style}的整体形象，而不是堆叠吉祥字。`;
  if(method==='jia')return`借自然或文化意象寄托祝愿，${record.source?'同时保留可核验的原文依据':'以现代汉语中已经成立的意象关系为基础'}。`;
  const family=[];
  if(input.generationChar)family.push(`辈分字“${input.generationChar}”`);
  if(record.familyDirect)family.push(`母姓“${input.motherSurname}”直接入名`);
  if(mHits.length)family.push(`母姓意象${mHits.join('、')}`);
  return`以家族关系为立意，通过${family.join('、')||'父母与家族共同期待'}形成呼应，同时保留完整姓名的自然读感。`;
}

function semanticText(record,input){
  if(EXPLANATIONS[record.name])return EXPLANATIONS[record.name];
  if(record.source)return`从可核验典籍语句中取意，表达${record.meanings?.join('、')||input.meaning}，原文语境经单独标注。`;
  return`“${record.name}”作为一个整体表达${record.meanings?.join('、')||input.meaning}，语义关系完整，适合日常与成年后的正式使用。`;
}

function score(record,input){
  const surname=fullSurname(input);const sound=Base.toneReview(surname,record.name);
  const methods=methodsFor(record,input);const bHits=birthHit(record,input);const mHits=maternalHit(record,input);
  let total=record.quality*0.38+sound.score*0.24;
  if(methods.includes(input.namingMethod))total+=20;else total-=10;
  if(record.styles?.includes(input.style))total+=8;
  if(record.meanings?.includes(input.meaning))total+=6;
  if(input.gender!=='neutral'){if(record.gender===input.gender)total+=5;else if(record.gender==='neutral')total+=1;}
  const birthCap=input.namingMethod==='xin'?12:4;
  total+=Math.min(birthCap,bHits.length*(input.namingMethod==='xin'?4:1.5));
  const familyCap=input.namingMethod==='lei'?12:4;
  total+=Math.min(familyCap,mHits.length*3+(input.generationChar&&record.name.includes(input.generationChar)?6:0)+(record.familyDirect?7:0));
  if(input.avoidTrend&&record.popularity>=4)total-=3+(record.popularity-4)*2;
  if(input.feedback?.tooCommon&&record.popularity>=4)total-=8;
  if(input.feedback?.tooRare&&record.popularity<=1)total-=7;
  if(record.source)total+=1;
  return{...record,total,sound,methods,birthHit:bHits,maternalHit:mHits};
}

function diversify(ranked,limit){
  const selected=[];const firstCount=new Map();const styleCount=new Map();
  for(const candidate of ranked){
    const first=candidate.name[0];const mainStyle=candidate.styles?.[0]||'';
    if((firstCount.get(first)||0)>=1&&ranked.length>limit*2)continue;
    if((styleCount.get(mainStyle)||0)>=2&&ranked.length>limit*2)continue;
    selected.push(candidate);
    firstCount.set(first,(firstCount.get(first)||0)+1);
    styleCount.set(mainStyle,(styleCount.get(mainStyle)||0)+1);
    if(selected.length>=limit*4)break;
  }
  return selected;
}

function buildNamingBrief(rawInput){
  const input=normalizeInput(rawInput);const method=METHODS[input.namingMethod]||METHODS.yi;
  const family=[];
  if(input.generationChar)family.push(`使用${input.generationPosition==='first'?'首字':input.generationPosition==='second'?'末字':'任一位置'}辈分字“${input.generationChar}”`);
  if(input.maternalMode==='symbolic')family.push(`轻度呼应母姓“${input.motherSurname}”的文化意象`);
  if(input.maternalMode==='direct')family.push(`将母姓“${input.motherSurname}”直接纳入名字`);
  if(input.elderTabooChars)family.push(`避开长辈用字“${input.elderTabooChars}”`);
  const wish=input.familyWish?.trim()||`希望孩子拥有${input.meaning}，整体气质${input.style}`;
  return`${method.label}：${wish}；${family.join('，')||'不设置额外家族字形约束'}。名字自然度、完整语义与全名读感优先。`;
}

function recommend(rawInput,batch=0,limit=6){
  const input=normalizeInput(rawInput);const pool=[...Base.CORPUS,...makeDirectFamilyRecords(input)];
  const prepared=pool.filter(record=>hardFilter(record,input)).map(record=>score(record,input));
  let matched=prepared.filter(record=>methodMatch(record,input));
  if(matched.length<limit)matched=[...matched,...prepared.filter(record=>!matched.some(item=>item.name===record.name))];
  matched.sort((a,b)=>b.total-a.total||b.quality-a.quality||a.name.localeCompare(b.name,'zh-CN'));
  const diverse=diversify(matched,limit);
  const offset=(Math.max(0,batch)*limit)%Math.max(limit,diverse.length||limit);
  let page=diverse.slice(offset,offset+limit);
  if(page.length<limit&&diverse.length>limit)page=[...page,...diverse.slice(0,limit-page.length)];
  const method=METHODS[input.namingMethod]||METHODS.yi;
  return page.map(record=>({
    ...record,
    fullName:fullSurname(input)+record.name,
    pinyin:Base.toneReview(fullSurname(input),record.name).pinyin.join(' · '),
    route:method.classical,
    routeLabel:method.label,
    routeReason:routeReason(record,input,input.namingMethod,record.birthHit,record.maternalHit),
    meaningText:semanticText(record,input),
    sourceType:sourceType(record),
    publicLevel:record.quality>=97&&record.sound.score>=90?'强推荐':record.quality>=93?'值得考虑':'风格探索'
  }));
}

return{METHODS,buildNamingBrief,recommend,fullSurname,birthTags};
});
</script>
<script>(function(){
'use strict';
const E=globalThis.HaoMingBookEngine;
if(!E)throw new Error('书籍研究版取名引擎未加载');
const $=id=>document.getElementById(id);
let batch=0;
let excluded=[];
let feedback={};

function esc(text=''){return String(text).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
function readInput(){return{
 fatherSurname:$('father-surname').value.trim()||'陈',motherSurname:$('mother-surname').value.trim()||'林',surnameMode:$('surname-mode').value,
 maternalMode:$('maternal-mode').value,gender:$('gender').value,generationChar:$('generation-char').value.trim(),generationPosition:$('generation-position').value,
 elderTabooChars:$('elder-taboo-chars').value.trim(),namingMethod:$('naming-method').value,familyWish:$('family-wish').value.trim(),
 birthDate:$('birth-date').value,birthTime:$('birth-time').value,timezone:$('timezone').value,traditionalReference:$('traditional-reference').checked,
 style:$('style').value,meaning:$('meaning').value,requiredChar:$('required-char').value.trim(),avoidChars:$('avoid-chars').value.trim(),
 customTaboos:$('custom-taboos').value.trim(),avoidTrend:$('avoid-trend').checked,excludedNames:excluded,feedback
};}

function renderSummary(input){
 const tags=E.birthTags(input);const surname=E.fullSurname(input);const method=E.METHODS[input.namingMethod];
 $('naming-brief').innerHTML=`<div class="brief-label">本次命名立意</div><p>${esc(E.buildNamingBrief(input))}</p>`;
 $('birth-summary').innerHTML=`<b>${esc(surname)}姓</b><span>${esc(method.label)}</span><span>审美：${esc(input.style)}</span><span>核心寓意：${esc(input.meaning)}</span><span>出生纪念：${esc(tags.join('、')||'未启用')}</span><em>出生信息仅作纪念性参考，名字自然度、完整语义与全名读感优先。</em>`;
}

function feedbackButtons(item){
 return `<div class="actions"><button class="minor dislike" data-name="${esc(item.name)}">不喜欢这个名字</button><button class="minor preference" data-feedback="tooAncient">太古风</button><button class="minor preference" data-feedback="tooCommon">太普通</button><button class="minor preference" data-feedback="tooSoft">太柔</button><button class="minor preference" data-feedback="tooHard">太硬</button></div>`;
}

function render(){
 const input=readInput();const results=E.recommend(input,batch,6);renderSummary(input);
 $('recommendations').innerHTML=results.length?results.map(item=>{
  const source=item.sourceType==='direct'?`直接出处：${item.source}`:'现代语义：无直接可靠出处，按完整语义与现实姓名习惯推荐。';
  const evidence=[item.routeLabel,item.styles.includes(input.style)?`符合“${input.style}”`:item.styles[0],item.meanings.includes(input.meaning)?`侧重${input.meaning}`:'语义完整',item.birthHit.length?`出生呼应：${item.birthHit.join('、')}`:'',item.maternalHit.length?`家庭呼应：${item.maternalHit.join('、')}`:''].filter(Boolean);
  const sound=item.sound.warnings.length?`整体可读；需留意：${item.sound.warnings.join('、')}`:'声调有起伏，连读自然，没有明显同音硬伤。';
  return `<article><div class="card-top"><div><div class="category">${esc(item.publicLevel)} · ${esc(item.routeLabel)}</div><h2>${esc(item.fullName)}</h2><div class="pinyin">${esc(item.pinyin)}</div></div><span class="route-mark">${esc(item.route)}</span></div><p class="meaning">${esc(item.meaningText)}</p><div class="reason-tags">${evidence.map(x=>`<span>${esc(x)}</span>`).join('')}</div><dl><dt>命名依据</dt><dd>${esc(item.routeReason)}</dd><dt>全名读感</dt><dd>${esc(sound)}</dd><dt>出处等级</dt><dd>${esc(source)}</dd></dl>${feedbackButtons(item)}</article>`;
 }).join(''):'<div class="empty">当前条件下没有达到自然度和语义门槛的名字。可以放宽辈分字位置、减少避讳字，或切换另一种命名方法；系统不会用生硬组合凑数。</div>';
 document.querySelectorAll('.dislike').forEach(btn=>btn.addEventListener('click',()=>{excluded=[...new Set([...excluded,btn.dataset.name])];batch=0;render();}));
 document.querySelectorAll('.preference').forEach(btn=>btn.addEventListener('click',()=>{feedback={...feedback,[btn.dataset.feedback]:true};batch=0;render();}));
}

$('generate').addEventListener('click',()=>{batch=0;excluded=[];feedback={};render();});
$('refresh').addEventListener('click',()=>{batch+=1;render();});
$('surname-mode').addEventListener('change',event=>{if(event.target.value==='double')$('name-length-note').textContent='双姓已经较长，实际登记前建议重点复核全名长度与连读。';else $('name-length-note').textContent='';});
$('naming-method').addEventListener('change',()=>{batch=0;render();});
render();
})();
</script>
