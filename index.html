<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>好名有解｜宝宝智能取名</title><style>
:root{--g:#294f3f;--gold:#b18b52;--bg:#f4f1ea;--card:#fffdf8;--line:#ded8cb;--muted:#6e766f}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#1e2722;font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif}.wrap{max-width:1320px;margin:auto;padding:22px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.brand{display:flex;gap:12px;align-items:center}.logo{width:46px;height:46px;border-radius:14px;background:var(--g);color:#fff;display:grid;place-items:center;font:700 24px serif}.brand h1{font-size:22px;margin:0}.brand p{margin:3px 0 0;color:var(--muted);font-size:13px}.hero,.panel,.card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:0 14px 38px #222d2710}.hero{padding:32px 36px;margin-bottom:20px;background:linear-gradient(135deg,#fffdf8,#eaf0e9)}.hero h2{font:700 32px/1.28 "Songti SC",serif;margin:8px 0}.hero p{margin:0;color:var(--muted);line-height:1.7}.ey{font-size:12px;letter-spacing:.14em;color:var(--gold);font-weight:700}.grid{display:grid;grid-template-columns:360px 1fr;gap:20px}.panel{padding:24px;height:max-content}.panel h3{margin:0 0 4px}.sub{color:var(--muted);font-size:13px;margin:0 0 18px}label{display:block;font-size:13px;font-weight:650;margin:14px 0 7px}input,select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:11px;background:white}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.chips{display:flex;flex-wrap:wrap;gap:7px}.chip{border:1px solid var(--line);background:#fff;border-radius:99px;padding:7px 10px;font-size:12px;cursor:pointer}.chip.on{background:var(--g);color:#fff;border-color:var(--g)}.primary,.ghost{border:0;border-radius:12px;padding:12px 14px;cursor:pointer}.primary{width:100%;margin-top:20px;background:var(--g);color:#fff;font-weight:700}.ghost{background:#fff;border:1px solid var(--line)}.surname{display:flex;gap:16px;align-items:center;margin-bottom:17px}.sicon{min-width:58px;height:58px;border-radius:17px;background:var(--g);color:#fff;display:grid;place-items:center;font:700 27px serif}.surname p{margin:4px 0 0;color:var(--muted);line-height:1.6;font-size:14px}.rhead{display:flex;justify-content:space-between;align-items:end;margin:16px 2px 12px}.rhead h3{margin:4px 0 0}.cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{padding:20px}.ntop{display:flex;justify-content:space-between}.name{font:700 29px "Songti SC",serif;letter-spacing:.08em}.py{font-size:12px;color:var(--muted);margin-top:4px}.score{width:52px;height:52px;border-radius:50%;background:#e8eee8;display:grid;place-items:center;color:var(--g);font-weight:800}.tags{display:flex;gap:6px;flex-wrap:wrap;margin:13px 0}.tag{background:#f1eee7;border-radius:99px;padding:5px 8px;font-size:11px}.desc{font-size:14px;line-height:1.65;min-height:46px}.source{border-top:1px dashed var(--line);padding-top:10px;margin-top:10px;color:var(--gold);font-size:12px}.actions{display:flex;gap:8px;margin-top:13px}.actions button{flex:1;border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px;cursor:pointer}.actions .saved{background:var(--g);color:#fff}.modal{position:fixed;inset:0;background:#1118;display:grid;place-items:center;padding:18px}.modal.hide{display:none}.box{max-width:580px;width:100%;background:#fffdf8;border-radius:20px;padding:24px}.box pre{white-space:pre-wrap;line-height:1.7;font-family:inherit}.close{float:right;border:0;background:none;font-size:24px}@media(max-width:900px){.grid{grid-template-columns:1fr}.cards{grid-template-columns:1fr}.hero h2{font-size:27px}}@media(max-width:560px){.wrap{padding:14px}.brand p{display:none}.two{grid-template-columns:1fr}.hero{padding:24px 20px}}
</style></head><body><div class="wrap"><header class="top"><div class="brand"><div class="logo">名</div><div><h1>好名有解</h1><p>为姓氏找到真正合适的名字</p></div></div><button id="favBtn" class="ghost">已收藏 <b id="favCount">0</b></button></header><section class="hero"><span class="ey">宝宝取名 · MVP</span><h2>一个好名字，要经得起读、写、解释和成长</h2><p>从姓氏适配、音律、寓意、文化出处、独特性与书写难度等维度生成名字。</p></section><main class="grid"><aside class="panel"><h3>告诉我们你的偏好</h3><p class="sub">基础信息越准确，推荐越贴合</p><form id="form"><label>宝宝姓氏</label><input id="surname" maxlength="2" value="林" required><div class="two"><div><label>性别倾向</label><select id="gender"><option value="neutral">中性</option><option value="boy">男孩</option><option value="girl">女孩</option></select></div><div><label>名字长度</label><select id="len"><option value="2">双字名</option><option value="1">单字名</option></select></div></div><label>风格偏好</label><div id="styles" class="chips"></div><label>希望表达的寓意</label><div id="meanings" class="chips"></div><div class="two"><div><label>独特程度</label><select id="rarity"><option value="balanced">适度独特</option><option value="common">稳妥耐看</option><option value="rare">小众高级</option></select></div><div><label>书写偏好</label><select id="writing"><option value="easy">简单易写</option><option value="balanced">不过度限制</option></select></div></div><label>指定字（可选）</label><input id="required" maxlength="1" placeholder="例如：安"><label>避开字（可选）</label><input id="avoid" placeholder="例如：梓宸轩"><button class="primary">生成专属名字方案</button></form></aside><section><div id="surnameCard" class="panel surname"></div><div class="rhead"><div><span class="ey">推荐方案</span><h3 id="title"></h3></div><button id="again" class="ghost">换一批</button></div><div id="cards" class="cards"></div></section></main></div><div id="modal" class="modal hide"><div class="box"><button class="close">×</button><h3 id="mTitle"></h3><pre id="mText"></pre></div></div><script>
const chars=[['知','zhī',1,'neutral','智慧,品格','温润儒雅,现代简洁','知晓、见识与自省，表达通达而有分寸。','《论语》：知之为知之，不知为不知。',55,8],['远','yuǎn',3,'boy','志向,智慧','大气稳重,温润儒雅','目光长远、志向高远，也有开阔格局之意。','诸葛亮《诫子书》：非宁静无以致远。',48,7],['安','ān',1,'neutral','平安,品格','现代简洁,温润儒雅','安宁、安稳、从容，寓意一生平顺而内心笃定。','《诗经》中“安”代表安定和顺。',32,6],['宁','níng',2,'neutral','平安,品格','温润儒雅,古典诗意','安宁、宁静、不浮躁，气质克制平和。','诸葛亮《诫子书》：非宁静无以致远。',35,5],['川','chuān',1,'neutral','自然,志向','清朗自然,现代简洁','江川流动、开阔包容，名字疏朗有空间感。','山川是古典文学常见自然意象。',60,3],['景','jǐng',3,'neutral','明朗,志向','古典诗意,大气稳重','景明、景行，寓意光明、德行与值得仰望的道路。','《诗经》：高山仰止，景行行止。',45,12],['昭','zhāo',1,'neutral','明朗,品格','古典诗意,大气稳重','光明磊落、清晰显著，气质明朗端正。','《诗经》中“昭”多用于光明显著之意。',68,9],['清','qīng',1,'neutral','品格,自然','清朗自然,古典诗意','清澈、清正、清醒，寓意品格纯粹。','古典诗词常以“清”表达澄澈高洁。',42,11],['和','hé',2,'neutral','平安,品格','温润儒雅,现代简洁','温和、和谐、有分寸，具有稳定的人际气质。','《论语》：礼之用，和为贵。',58,8],['砚','yàn',4,'neutral','智慧,品格','温润儒雅,古典诗意','文房之器，象征沉静、学识和长期积累。','砚是传统文房四宝之一。',78,9],['怀','huái',2,'neutral','品格,智慧','古典诗意,温润儒雅','胸怀、怀德、怀远，寓意内心丰厚而有担当。','屈原《九章》：怀瑾握瑜兮。',62,7],['瑾','jǐn',3,'neutral','品格,明朗','古典诗意,温润儒雅','美玉之光，常比喻美德与珍贵品格。','屈原《九章》：怀瑾握瑜兮。',52,15],['谦','qiān',1,'boy','品格,智慧','温润儒雅,大气稳重','谦逊有礼、克制自持，寓意有实力而不张扬。','《周易》谦卦强调谦德与持盈。',57,12],['允','yǔn',3,'neutral','品格,平安','现代简洁,温润儒雅','诚信、公允、允当，名字简洁而有古意。','允执厥中，表达公允持中。',70,4],['叙','xù',4,'neutral','智慧,品格','现代简洁,温润儒雅','叙事、秩序与表达，气质理性克制。','“叙”有陈述、次序之意。',82,9],['衡','héng',2,'boy','智慧,品格','大气稳重,现代简洁','权衡、平衡、准则，寓意思考周全、处事持正。','“衡”引申为尺度与判断。',66,16],['晏','yàn',4,'neutral','平安,明朗','古典诗意,清朗自然','晴朗、安宁、从容，气质安静而不柔弱。','河清海晏，寓意天下安宁。',75,10],['禾','hé',2,'girl','自然,平安','清朗自然,现代简洁','禾苗、生长与丰足，简单自然，生命力温和。','禾是农耕文明的重要意象。',73,5],['予','yǔ',3,'neutral','品格,平安','现代简洁,温润儒雅','给予、分享，简洁而有温度。','古汉语常用字，含给予之义。',54,4],['初','chū',1,'girl','明朗,品格','现代简洁,清朗自然','初心、开始、纯粹，寓意保持真诚。','初心表达最初的志愿与本真。',64,7],['舒','shū',1,'girl','平安,明朗','温润儒雅,现代简洁','舒展、从容、自在，寓意人生开阔舒朗。','云卷云舒，体现从容自然。',50,12],['月','yuè',4,'girl','自然,明朗','古典诗意,清朗自然','明月、澄澈与温柔，具有东方审美意象。','月是中国诗词经典意象。',47,4],['澄','chéng',2,'neutral','智慧,品格','清朗自然,古典诗意','澄明、清澈、通透，寓意内心清醒坚定。','澄怀观道，体现澄明心境。',72,15],['野','yě',3,'neutral','自然,志向','清朗自然,现代简洁','旷野、自由与生命力，风格鲜明。','星垂平野阔中的旷野意象。',84,11],['修','xiū',1,'boy','品格,智慧','温润儒雅,大气稳重','修身、修学、修远，寓意持续自我完善。','《大学》强调修身是立身之本。',56,9]].map(x=>({c:x[0],p:x[1],tone:x[2],gender:x[3],meanings:x[4].split(','),styles:x[5].split(','),desc:x[6],source:x[7],rare:x[8],strokes:x[9]}));const surnames={林:[2,'“林”姓音色柔和，带自然意象，适合清朗、稳重或书卷气的字；避免琳、霖、临等同音叠加。'],王:[2,'“王”姓简洁有力量，建议名字在声调和字形上增加变化。'],李:[3,'“李”姓为上声，后接阴平、阳平或去声更有起伏。'],张:[1,'“张”姓开口响亮，名字宜适当收敛，避免声韵过度重复。'],吴:[2,'“吴”与“无”同音，尤其需要检查全名是否形成消极短语。'],陈:[2,'“陈”姓沉稳耐听，适合搭配清亮或有上扬感的名字。'],杨:[2,'“杨”姓音色明亮，适合搭配去声或上声形成节奏变化。'],周:[1,'“周”姓圆润稳定，适合搭配有棱角或开阔感的字。']};let seed=0,current=[],saved=JSON.parse(localStorage.getItem('haoming_saved')||'[]');const $=s=>document.querySelector(s);function chips(id,arr,multi){$(id).innerHTML=arr.map((x,i)=>`<button type="button" class="chip ${i<(multi?2:1)?'on':''}" data-v="${x}">${x}</button>`).join('');$(id).onclick=e=>{if(!e.target.matches('.chip'))return;if(multi)e.target.classList.toggle('on');else{[...$(id).children].forEach(x=>x.classList.remove('on'));e.target.classList.add('on')}}}chips('#styles',['温润儒雅','清朗自然','大气稳重','现代简洁','古典诗意']);chips('#meanings',['智慧','平安','志向','品格','自然','明朗'],true);function make(){let s=$('#surname').value.trim()||'林',g=$('#gender').value,l=+$('#len').value,st=$('#styles .on').dataset.v,ms=[...document.querySelectorAll('#meanings .on')].map(x=>x.dataset.v),rar=$('#rarity').value,w=$('#writing').value,req=$('#required').value.trim(),avoid=$('#avoid').value;let score=c=>50+(c.gender==='neutral'||c.gender===g?12:0)+(c.styles.includes(st)?14:0)+c.meanings.filter(x=>ms.includes(x)).length*9+(rar==='rare'?c.rare/10:rar==='common'?(100-c.rare)/10:0)+(w==='easy'?Math.max(0,10-c.strokes/2):0)+Math.random()*4;let pool=chars.filter(c=>!avoid.includes(c.c)).sort((a,b)=>score(b)-score(a));if(req&&!pool.find(x=>x.c===req))pool.unshift({c:req,p:'',tone:0,gender:'neutral',meanings:ms,styles:[st],desc:'用户指定用字，建议结合家族寓意进一步解释。',source:'指定用字',rare:60,strokes:8});let out=[];for(let i=0;i<150&&out.length<8;i++){let a=pool[(i+seed)%pool.length],b=l===2?pool[(i*3+5+seed)%pool.length]:null;if(b&&a.c===b.c)continue;if(req&&a.c!==req&&(!b||b.c!==req)){if(l===2)b=pool.find(x=>x.c===req)||b;else a=pool.find(x=>x.c===req)||a}let full=s+a.c+(b?b.c:'');if(out.find(x=>x.full===full))continue;let tones=[(surnames[s]||[0])[0],a.tone,b?.tone].filter(Boolean),rh=new Set(tones).size,sc=Math.min(96,78+Math.min(8,rh*2)+(a.styles.includes(st)?3:0)+(b?.styles.includes(st)?3:0)+Math.min(5,(a.meanings.filter(x=>ms.includes(x)).length+(b?.meanings.filter(x=>ms.includes(x)).length||0))*2));out.push({full,chars:[a,b].filter(Boolean),score:Math.round(sc),style:st,desc:b?a.desc.replace(/。$/,'')+'；'+b.desc:a.desc,source:b&&a.source!==b.source?a.source+'；'+b.source:a.source,rhythm:rh>=3?'有起伏':'较平稳',rarity:Math.round((a.rare+(b?.rare||a.rare))/2),writing:a.strokes+(b?.strokes||0)<=16?'简单':'适中'})}current=out;seed++;render(s)}function render(s){let info=surnames[s]||[0,`“${s}”姓将按全名音律、字义与谐音综合匹配，建议结合家庭方言再次朗读确认。`];$('#surnameCard').innerHTML=`<div class="sicon">${s}</div><div><b>先看姓氏：${s}</b><p>${info[1]}</p></div>`;$('#title').textContent=`为“${s}”姓生成的名字`;$('#cards').innerHTML=current.map((n,i)=>`<article class="card"><div class="ntop"><div><div class="name">${n.full}</div><div class="py">${n.chars.map(x=>x.p).join(' · ')}</div></div><div class="score">${n.score}</div></div><div class="tags"><span class="tag">${n.style}</span>${[...new Set(n.chars.flatMap(x=>x.meanings))].slice(0,2).map(x=>`<span class="tag">${x}</span>`).join('')}</div><div class="desc">${n.desc}</div><div class="source">文化说明：${n.source}</div><div class="actions"><button onclick="detail(${i})">详细分析</button><button class="${saved.find(x=>x.full===n.full)?'saved':''}" onclick="fav(${i},this)">${saved.find(x=>x.full===n.full)?'已收藏':'收藏'}</button></div></article>`).join('')}function detail(i){let n=current[i];$('#mTitle').textContent=n.full;$('#mText').textContent=`综合评分：${n.score}\n风格：${n.style}\n音律：${n.rhythm}\n独特性：${n.rarity>70?'较高':n.rarity>50?'适中':'偏大众'}\n书写：${n.writing}\n\n寓意：${n.desc}\n\n文化说明：${n.source}\n\n提示：正式使用前，建议结合家庭方言、亲属姓名和当地户籍用字规范再次核验。`;$('#modal').classList.remove('hide')}function fav(i,b){let n=current[i],k=saved.findIndex(x=>x.full===n.full);if(k>=0){saved.splice(k,1);b.classList.remove('saved');b.textContent='收藏'}else{saved.push(n);b.classList.add('saved');b.textContent='已收藏'}localStorage.setItem('haoming_saved',JSON.stringify(saved));count()}function count(){$('#favCount').textContent=saved.length}$('#form').onsubmit=e=>{e.preventDefault();make()};$('#again').onclick=make;$('.close').onclick=()=>$('#modal').classList.add('hide');$('#modal').onclick=e=>{if(e.target.id==='modal')$('#modal').classList.add('hide')};$('#favBtn').onclick=()=>{if(!saved.length)return alert('还没有收藏名字');$('#mTitle').textContent='已收藏名字';$('#mText').textContent=saved.map(x=>`${x.full}｜${x.desc}`).join('\n\n');$('#modal').classList.remove('hide')};count();make();
</script></body></html>
