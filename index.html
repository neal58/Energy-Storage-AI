<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>好名有解</title><style>*{box-sizing:border-box}body{margin:0;background:#f4f1ea;color:#1f2923;font-family:"PingFang SC","Microsoft YaHei",sans-serif}.w{max-width:1100px;margin:auto;padding:18px}.hero,.panel,.card{background:#fffdf8;border:1px solid #ddd6c9;border-radius:18px}.hero{padding:25px;margin-bottom:16px}.hero h1{margin:0 0 7px;font:700 30px serif}.hero p{margin:0;color:#69736d}.layout{display:grid;grid-template-columns:310px 1fr;gap:16px}.panel{padding:18px;height:max-content}label{display:block;font-size:13px;font-weight:700;margin:12px 0 6px}input,select{width:100%;padding:10px;border:1px solid #d5cec1;border-radius:9px;background:#fff}.btn{width:100%;margin-top:16px;padding:12px;border:0;border-radius:10px;background:#294f3f;color:#fff;font-weight:700;cursor:pointer}.note{margin-bottom:12px;color:#647068}.cards{display:grid;grid-template-columns:1fr 1fr;gap:11px}.card{padding:17px;position:relative}.card h3{font:700 27px serif;margin:7px 0}.score{position:absolute;right:14px;top:14px;width:45px;height:45px;border-radius:50%;display:grid;place-items:center;background:#e8eee8;color:#294f3f;font-weight:800}.slot{font-size:12px;color:#9a7441;font-weight:700}.py{font-size:12px;color:#748078}.tag{display:inline-block;background:#f1eee7;border-radius:99px;padding:5px 8px;font-size:11px;margin:0 5px 5px 0}.card p{font-size:14px;line-height:1.6}.secondary{padding:8px 10px;border:1px solid #d5cec1;border-radius:8px;background:#fff;cursor:pointer}.compare{margin-top:15px}.compare-head{display:flex;justify-content:space-between;align-items:center}.compare-list{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.compare-item{border:1px solid #ddd6c9;border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:5px}@media(max-width:780px){.layout{grid-template-columns:1fr}.cards,.compare-list{grid-template-columns:1fr}}@media(max-width:420px){.w{padding:11px}.hero{padding:19px}}</style></head><body><div class="w"><section class="hero"><h1>好名有解</h1><p>先淘汰不好听和不自然的名字，再谈寓意、出处与个性。</p></section><main class="layout"><aside class="panel"><h2>取名条件</h2><label>宝宝姓氏</label><input id="surname" value="林" maxlength="2"><label>性别倾向</label><select id="gender"><option value="neutral">中性</option><option value="boy">男孩</option><option value="girl">女孩</option></select><label>风格偏好</label><select id="style"><option>温润</option><option>清朗</option><option>稳重</option><option>现代</option><option>古典</option><option>自然</option></select><label>寓意偏好</label><select id="meaning"><option>智慧</option><option>志向</option><option>平安</option><option>品格</option><option>光明</option><option>自然</option></select><label>指定字（可选）</label><input id="required" maxlength="1" placeholder="如：安"><label>避开字（可选）</label><input id="avoid" placeholder="如：梓宸轩"><button id="generate" class="btn">生成名字方案</button></aside><section><div id="note" class="panel note"></div><div id="cards" class="cards"></div><section class="panel compare"><div class="compare-head"><h2>名字对比</h2><button id="clear" class="secondary">清空</button></div><div id="compare" class="compare-list"></div></section></section></main></div><script>const D=[['知远','zhī · yuǎn','neutral',['温润','稳重'],['智慧','志向'],94,95,96,92,52,'诸葛亮《诫子书》：非宁静无以致远。'],['清和','qīng · hé','neutral',['温润','清雅'],['品格','平安'],96,95,97,93,48,''],['昭宁','zhāo · níng','neutral',['明朗','古典'],['光明','平安'],92,94,95,90,68,''],['景澄','jǐng · chéng','neutral',['清朗','自然'],['光明','品格'],93,92,95,78,75,''],['怀谦','huái · qiān','boy',['温润','稳重'],['品格','智慧'],95,96,97,82,60,''],['允修','yǔn · xiū','boy',['温润','古典'],['品格','智慧'],91,95,96,88,74,''],['景川','jǐng · chuān','boy',['清朗','自然'],['志向','自然'],94,91,96,91,58,''],['知衡','zhī · héng','boy',['稳重','现代'],['智慧','品格'],93,96,98,80,67,''],['砚川','yàn · chuān','boy',['书卷','自然'],['智慧','志向'],90,93,95,80,82,''],['修远','xiū · yuǎn','boy',['稳重','古典'],['品格','志向'],93,95,98,87,50,'屈原《离骚》：路漫漫其修远兮。'],['明川','míng · chuān','boy',['明朗','自然'],['光明','志向'],95,91,97,95,45,''],['承安','chéng · ān','boy',['稳重','温润'],['责任','平安'],94,93,98,92,42,''],['予宁','yǔ · níng','girl',['温柔','现代'],['平安','品格'],95,93,96,95,55,''],['清禾','qīng · hé','girl',['自然','清雅'],['自然','品格'],96,92,95,96,62,''],['月澄','yuè · chéng','girl',['诗意','清朗'],['光明','自然'],91,94,94,79,80,''],['初宁','chū · níng','girl',['现代','温柔'],['平安','光明'],95,91,96,96,58,''],['舒月','shū · yuè','girl',['温柔','自然'],['平安','自然'],94,92,95,88,56,''],['知夏','zhī · xià','girl',['现代','明朗'],['智慧','自然'],92,91,94,94,66,''],['清晏','qīng · yàn','neutral',['古典','清雅'],['平安','品格'],94,95,97,82,77,''],['予安','yǔ · ān','neutral',['温柔','现代'],['平安','品格'],96,92,96,97,46,''],['叙川','xù · chuān','neutral',['现代','自然'],['智慧','志向'],90,91,95,91,85,''],['允和','yǔn · hé','neutral',['温润','清雅'],['品格','平安'],94,94,97,91,64,''],['明序','míng · xù','neutral',['现代','稳重'],['光明','智慧'],91,92,96,91,81,''],['清越','qīng · yuè','neutral',['清朗','古典'],['品格','志向'],93,93,95,86,73,''],['安澄','ān · chéng','neutral',['温润','清朗'],['平安','品格'],94,94,97,83,70,''],['景明','jǐng · míng','neutral',['明朗','古典'],['光明','志向'],95,94,97,92,50,'范仲淹《岳阳楼记》：至若春和景明。'],['云舒','yún · shū','girl',['自然','温柔'],['平安','自然'],95,91,94,90,54,''],['书宁','shū · níng','girl',['书卷','温柔'],['智慧','平安'],93,93,96,92,57,'']].map(x=>({name:x[0],pinyin:x[1],gender:x[2],styles:x[3],meanings:x[4],natural:x[5],semantic:x[6],growth:x[7],writing:x[8],rarity:x[9],source:x[10]}));const N={林:'音色柔和，宜搭配有起伏、较清朗的名字。',王:'简洁有力量，名字宜增加声调变化。',李:'上声起伏明显，后接阴平或阳平更舒展。',张:'开口响亮，名字宜适当收敛。',刘:'音色圆润，适合清亮或稳重的组合。',陈:'沉稳耐听，适合搭配清亮或上扬的名字。',杨:'音色明亮，宜搭配去声或上声形成节奏。',赵:'去声有力量，后续音节宜舒展。',吴:'与“无”同音，必须重点检查全名语义。'};const $=s=>document.querySelector(s),slots=['最贴合','稳妥型','小众型','文化型','现代型','探索型'];let current=[];function score(x,s,m){let v=x.natural*.3+85*.25+x.semantic*.15+x.growth*.1+x.writing*.1;if(x.styles.includes(s))v+=4;if(x.meanings.includes(m))v+=3;return Math.min(98,Math.round(v))}function gen(){let surname=$('#surname').value.trim()||'林',g=$('#gender').value,s=$('#style').value,m=$('#meaning').value,a=$('#avoid').value.trim(),r=$('#required').value.trim();let p=D.filter(x=>(g==='neutral'||x.gender==='neutral'||x.gender===g)&&(!a||![...a].some(c=>x.name.includes(c)))&&(!r||x.name.includes(r))).map(x=>({...x,total:score(x,s,m)})).sort((a,b)=>b.total-a.total),c=[],pick=f=>{let x=p.find(y=>!c.includes(y)&&f(y));if(x)c.push(x)};pick(()=>1);pick(x=>x.rarity<=55);pick(x=>x.rarity>=70);pick(x=>x.source);pick(x=>x.styles.includes('现代'));pick(()=>1);current=c;$('#note').textContent=surname+'姓分析：'+(N[surname]||'将按全名自然度、音律和语义综合判断。');render()}function render(){let surname=$('#surname').value.trim()||'林';$('#cards').innerHTML=current.length?current.map((x,i)=>`<article class="card"><div class="slot">${slots[i]}</div><div class="score">${x.total}</div><h3>${surname}${x.name}</h3><p class="py">${x.pinyin}</p><div>${x.styles.map(t=>`<span class="tag">${t}</span>`).join('')}${x.meanings.map(t=>`<span class="tag">${t}</span>`).join('')}</div><p>自然度 ${x.natural} · 语义 ${x.semantic} · 成长适配 ${x.growth}</p><p>${x.source?'出处：'+x.source:'无可靠出处，按语言与审美规则推荐。'}</p><button class="secondary" onclick="add(${i})">加入对比</button></article>`).join(''):'<div class="panel">当前条件下没有足够高质量的名字，请减少限制。</div>'}function add(i){let s=JSON.parse(localStorage.getItem('hm')||'[]');if(!s.find(x=>x.name===current[i].name)&&s.length<3)s.push(current[i]);localStorage.setItem('hm',JSON.stringify(s));cmp()}function cmp(){let surname=$('#surname').value.trim()||'林',s=JSON.parse(localStorage.getItem('hm')||'[]');$('#compare').innerHTML=s.length?s.map(x=>`<div class="compare-item"><b>${surname}${x.name}</b><span>总分 ${x.total}</span><span>自然度 ${x.natural}</span><span>语义 ${x.semantic}</span><span>成长适配 ${x.growth}</span></div>`).join(''):'尚未选择名字。'}$('#generate').onclick=gen;$('#clear').onclick=()=>{localStorage.removeItem('hm');cmp()};gen();cmp();</script></body></html>
