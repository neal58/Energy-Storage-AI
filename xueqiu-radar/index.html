<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>雪球大V雷达</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f3f5f8;color:#182235;font-family:Arial,"Microsoft YaHei",sans-serif}.wrap{max-width:1180px;margin:auto;padding:20px}.hero{background:linear-gradient(135deg,#172f4d,#2b66a2);color:#fff;border-radius:18px;padding:24px}.hero h1{margin:0 0 7px}.hero p{margin:0;opacity:.9}.tabs{display:flex;gap:8px;margin:16px 0;flex-wrap:wrap}.tabs button,.btn{border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;background:#e5ebf2;color:#244767}.tabs button.active,.btn.primary{background:#2764a5;color:#fff}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:15px}.stat,.panel,.card,.post{background:#fff;border:1px solid #e1e7ef;border-radius:14px;box-shadow:0 7px 22px #3341550c}.stat{padding:15px}.stat b{display:block;font-size:27px;color:#2764a5}.panel{padding:14px;margin-bottom:14px}.toolbar,.row,.actions{display:flex;align-items:center;gap:9px;flex-wrap:wrap}.row{justify-content:space-between}.toolbar input,.toolbar select{border:1px solid #cdd6e1;border-radius:9px;padding:10px;font:inherit}.toolbar input{min-width:260px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}.card{padding:17px}.identity{display:flex;gap:12px;align-items:center}.avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;background:#edf1f5}.card h3{margin:0 0 4px}.meta,.muted{color:#758295;font-size:13px}.score{font-size:27px;color:#2764a5}.tag{display:inline-block;border-radius:99px;background:#edf3fa;color:#31577f;padding:4px 8px;font-size:12px;margin:8px 5px 4px 0}.tag.gold{background:#fff0d4;color:#8a5900}.desc{line-height:1.55;min-height:45px}.actions{border-top:1px solid #edf0f4;margin-top:12px;padding-top:11px}.actions a{text-decoration:none}.post{padding:16px;margin-bottom:12px}.post-body{font-size:15px;line-height:1.7;white-space:pre-wrap;margin:12px 0}.quote{border-left:4px solid #d5dde8;background:#f7f9fb;padding:10px 12px;border-radius:6px;color:#536275}.notice{padding:12px;border-radius:10px;margin-bottom:12px;background:#eaf7ef;color:#17643a}.error{background:#fff0f0;color:#a12626}.empty{padding:45px;text-align:center;background:#fff;border-radius:14px}.hidden{display:none}.spinner{padding:45px;text-align:center;color:#718095}@media(max-width:760px){.stats,.grid{grid-template-columns:1fr 1fr}}@media(max-width:520px){.wrap{padding:12px}.stats,.grid{grid-template-columns:1fr}.toolbar input{width:100%;min-width:0}}
</style>
</head>
<body>
<div class="wrap">
<section class="hero"><h1>雪球大V雷达</h1><p>真实雪球数据｜浏览器扩展扫描你已登录后可见的页面｜粉丝≥1万进入候选池</p></section>
<div class="tabs"><button class="active" data-tab="people">大V候选</button><button data-tab="posts">真实动态</button><a class="btn" href="extension/README.html" target="_blank">安装扩展说明</a></div>
<div id="notice" class="notice hidden"></div>
<section id="stats" class="stats"><div class="stat"><b id="sAll">0</b>候选大V</div><div class="stat"><b id="sHead">0</b>头部大V</div><div class="stat"><b id="sCore">0</b>核心关注</div><div class="stat"><b id="sPosts">0</b>真实动态</div></section>
<section id="peopleView">
<div class="panel"><div class="toolbar"><input id="search" placeholder="搜索昵称、简介、行业"><select id="status"><option value="all">全部状态</option><option value="unreviewed">待筛选</option><option value="core">核心关注</option><option value="watch">观察名单</option><option value="ignored">已忽略</option><option value="blocked">已屏蔽</option></select><button class="btn primary" id="refresh">刷新</button></div></div>
<div id="people" class="grid"><div class="spinner">正在读取真实数据…</div></div>
</section>
<section id="postsView" class="hidden"><div class="panel"><div class="toolbar"><input id="postSearch" placeholder="搜索动态正文或作者"><button class="btn primary" id="refreshPosts">刷新动态</button></div></div><div id="posts"><div class="spinner">正在读取真实动态…</div></div></section>
</div>
<script>
const API='https://hbioiasauagkjcqmwqlw.supabase.co/functions/v1/xueqiu-radar-api';
const state={people:[],posts:[]};
const statusText={unreviewed:'待筛选',core:'核心关注',watch:'观察名单',ignored:'已忽略',blocked:'已屏蔽'};
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=n=>Number(n||0).toLocaleString();
const time=v=>v?new Date(v).toLocaleString('zh-CN'):'时间未知';
function notice(text,error=false){const el=document.querySelector('#notice');el.textContent=text;el.className='notice'+(error?' error':'');el.classList.remove('hidden');setTimeout(()=>el.classList.add('hidden'),4500)}
async function request(path,options){const res=await fetch(API+path,{...options,headers:{'content-type':'application/json',...(options&&options.headers||{})}});const data=await res.json();if(!res.ok)throw new Error(data.error||'请求失败');return data}
async function loadPeople(){document.querySelector('#people').innerHTML='<div class="spinner">正在读取真实数据…</div>';try{state.people=(await request('/influencers')).influencers||[];renderPeople();updateStats()}catch(e){document.querySelector('#people').innerHTML='<div class="empty">读取失败：'+esc(e.message)+'</div>'}}
async function loadPosts(){document.querySelector('#posts').innerHTML='<div class="spinner">正在读取真实动态…</div>';try{state.posts=(await request('/posts?limit=150')).posts||[];renderPosts();updateStats()}catch(e){document.querySelector('#posts').innerHTML='<div class="empty">读取失败：'+esc(e.message)+'</div>'}}
function updateStats(){document.querySelector('#sAll').textContent=state.people.length;document.querySelector('#sHead').textContent=state.people.filter(x=>x.is_head).length;document.querySelector('#sCore').textContent=state.people.filter(x=>x.manual_status==='core').length;document.querySelector('#sPosts').textContent=state.posts.length}
function renderPeople(){const q=document.querySelector('#search').value.trim().toLowerCase(),st=document.querySelector('#status').value;const rows=state.people.filter(x=>(st==='all'||x.manual_status===st)&&(!q||[x.nickname,x.description,x.verified_description,...(x.primary_topics||[])].join(' ').toLowerCase().includes(q)));document.querySelector('#people').innerHTML=rows.length?rows.map(x=>`<article class="card"><div class="row"><div class="identity"><img class="avatar" src="${esc(x.avatar_url||'')}" onerror="this.style.visibility='hidden'"><div><h3>${esc(x.nickname)}</h3><div class="meta">粉丝 ${fmt(x.followers_count)} · ${esc(statusText[x.manual_status]||x.manual_status)}</div></div></div><b class="score">${Number(x.total_score||0).toFixed(1)}</b></div><div>${x.is_head?'<span class="tag gold">头部大V</span>':''}${x.verified_description?'<span class="tag">'+esc(x.verified_description)+'</span>':''}${(x.primary_topics||[]).map(t=>'<span class="tag">'+esc(t)+'</span>').join('')}</div><p class="desc">${esc(x.description||x.representative_content||'已从雪球页面同步，尚无简介。')}</p><div class="meta">最近同步：${time(x.last_synced_at)}</div><div class="actions"><a class="btn" href="${esc(x.profile_url)}" target="_blank">打开雪球</a>${[['core','核心关注'],['watch','观察'],['ignored','忽略'],['blocked','屏蔽']].map(([s,t])=>`<button class="btn" onclick="setStatus(${x.id},'${s}')">${t}</button>`).join('')}</div></article>`).join(''):'<div class="empty">暂无符合条件的大V。请安装扩展后，在已登录的雪球页面点击“扫描当前页面”。</div>'}
async function setStatus(id,status){try{await request('/status',{method:'PATCH',body:JSON.stringify({id,status})});const row=state.people.find(x=>x.id===id);if(row)row.manual_status=status;renderPeople();updateStats();notice('筛选状态已更新')}catch(e){notice(e.message,true)}}
function renderPosts(){const q=document.querySelector('#postSearch').value.trim().toLowerCase();const rows=state.posts.filter(x=>!q||[x.author_nickname,x.body,x.quoted_body].join(' ').toLowerCase().includes(q));document.querySelector('#posts').innerHTML=rows.length?rows.map(x=>`<article class="post"><div class="row"><div class="identity"><img class="avatar" src="${esc(x.author_avatar_url||'')}" onerror="this.style.visibility='hidden'"><div><b>${esc(x.author_nickname)}</b><div class="meta">${time(x.created_at_xueqiu)}</div></div></div><a class="btn" href="${esc(x.source_url)}" target="_blank">查看原文</a></div><div class="post-body">${esc(x.body)}</div>${x.quoted_body?'<div class="quote">'+esc(x.quoted_body)+'</div>':''}<div class="meta">赞 ${fmt(x.like_count)}　评论 ${fmt(x.comment_count)}　转发 ${fmt(x.retweet_count)}</div></article>`).join(''):'<div class="empty">还没有同步到真实动态。打开雪球页面并用扩展扫描即可。</div>'}
document.querySelector('#search').addEventListener('input',renderPeople);document.querySelector('#status').addEventListener('change',renderPeople);document.querySelector('#postSearch').addEventListener('input',renderPosts);document.querySelector('#refresh').onclick=loadPeople;document.querySelector('#refreshPosts').onclick=loadPosts;document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-tab]').forEach(x=>x.classList.toggle('active',x===b));const p=b.dataset.tab==='people';document.querySelector('#peopleView').classList.toggle('hidden',!p);document.querySelector('#postsView').classList.toggle('hidden',p);if(!p&&!state.posts.length)loadPosts()});
loadPeople();loadPosts();
</script>
</body></html>
