<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>好名有解 V2</title><style>body{margin:0;background:#f4f1ea;color:#1f2923;font-family:"PingFang SC","Microsoft YaHei",sans-serif}.wrap{max-width:1100px;margin:auto;padding:24px}.hero,.panel,.card{background:#fffdf8;border:1px solid #ded8cb;border-radius:20px}.hero{padding:28px;margin-bottom:18px}.hero h1{margin:0 0 8px;font:700 30px serif}.hero p{margin:0;color:#6e766f}.grid{display:grid;grid-template-columns:320px 1fr;gap:18px}.panel{padding:20px;height:max-content}label{display:block;font-size:13px;font-weight:700;margin:14px 0 7px}input,select{width:100%;box-sizing:border-box;padding:11px;border:1px solid #d8d3c8;border-radius:10px;background:white}.chips{display:flex;flex-wrap:wrap;gap:7px}.chip{border:1px solid #d8d3c8;background:#fff;border-radius:99px;padding:7px 10px;cursor:pointer}.chip.on{background:#294f3f;color:#fff}.btn{width:100%;margin-top:18px;padding:12px;border:0;border-radius:11px;background:#294f3f;color:#fff;font-weight:700}.cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{padding:18px}.name{font:700 28px serif}.meta{color:#718078;font-size:12px;margin:5px 0 12px}.tag{display:inline-block;background:#f1eee7;border-radius:99px;padding:5px 8px;font-size:11px;margin-right:5px}.desc{line-height:1.65;font-size:14px;margin-top:12px}.why{color:#9a7441;font-size:12px;border-top:1px dashed #ddd5c7;margin-top:12px;padding-top:10px}.score{float:right;width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:#e8eee8;color:#294f3f;font-weight:800}@media(max-width:800px){.grid{grid-template-columns:1fr}.cards{grid-template-columns:1fr}}</style></head><body><div class="wrap"><section class="hero"><h1>好名有解 · 名字审美版</h1><p>先保证名字自然、顺口、耐听，再解释寓意与出处。</p></section><main class="grid"><aside class="panel"><label>宝宝姓氏</label><input id="surname" value="林" maxlength="2"><label>性别倾向</label><select id="gender"><option value="neutral">中性</option><option value="boy">男孩</option><option value="girl">女孩</option></select><label>风格</label><div id="styles" class="chips"></div><label>侧重寓意</label><div id="meanings" class="chips"></div><label>避开字</label><input id="avoid" placeholder="如：梓宸轩"><button id="go" class="btn">重新推荐</button></aside><section><div id="summary" class="panel" style="margin-bottom:14px"></div><div id="cards" class="cards"></div></section></main></div><script>
const pairs=[
['知远','zhī yuǎn','neutral','温润儒雅','智慧,志向','见识通达、目光长远，整体沉稳而不老气。','取“知”之通达与“远”之格局。',88,[1,3]],
['清和','qīng hé','neutral','温润儒雅','品格,平安','清正温和、从容有度，读音舒展自然。','“清和”本身即为古典而自然的词语。',86,[1,2]],
['景行','jǐng xíng','boy','古典诗意','品格,志向','德行高远、道路光明，文化感强而不生僻。','《诗经》：“高山仰止，景行行止。”',82,[3,2]],
['予安','yǔ ān','neutral','现代简洁','平安,品格','给予平安，也有温柔而坚定的气质。','简洁自然，日常称呼亲切。',80,[3,1]],
['昭宁','zhāo níng','neutral','古典诗意','明朗,平安','光明安宁，读音清亮，男女皆可。','“昭”为明亮，“宁”为安定。',84,[1,2]],
['怀瑾','huái jǐn','neutral','古典诗意','品格,智慧','胸怀美玉，比喻内在品德与才华。','屈原《九章》：“怀瑾握瑜兮。”',76,[2,3]],
['砚川','yàn chuān','boy','清朗自然','智慧,自然','书卷气与山川感结合，疏朗、有辨识度。','砚代表学识，川代表开阔与流动。',91,[4,1]],
['知衡','zhī héng','boy','大气稳重','智慧,品格','有见识，也懂权衡，理性、稳重、适合成年阶段。','“知”与“衡”形成完整的处世寓意。',87,[1,2]],
['允和','yǔn hé','neutral','温润儒雅','品格,平安','公允温和，气质克制，读音柔和但不软弱。','“允”有诚信、公允之意。',83,[3,2]],
['清晏','qīng yàn','neutral','古典诗意','平安,明朗','清明安宁，音色清雅，古典但不拗口。','取“河清海晏”之安定意象。',89,[1,4]],
['修远','xiū yuǎn','boy','大气稳重','志向,品格','修身致远，含义完整，读起来稳健有力量。','屈原《离骚》有“路漫漫其修远兮”。',72,[1,3]],
['叙川','xù chuān','neutral','现代简洁','智慧,自然','有表达、有秩序，也有山川般的开阔感。','现代感较强，辨识度高。',93,[4,1]],
['景澄','jǐng chéng','neutral','清朗自然','明朗,品格','景明心澄，画面感干净，读音沉静。','自然意象与内在品格兼具。',90,[3,2]],
['予宁','yǔ níng','girl','温润儒雅','平安,品格','温柔安定，简洁好记，适合日常称呼。','“予”与“宁”组合自然亲切。',79,[3,2]],
['舒月','shū yuè','girl','清朗自然','平安,自然','舒展如月，柔和清亮，不甜腻。','月意象温柔，舒字带从容感。',85,[1,4]],
['初宁','chū níng','girl','现代简洁','平安,明朗','初心安宁，简洁干净，童年与成年都适用。','两个常用字组合自然。',78,[1,2]],
['清禾','qīng hé','girl','清朗自然','自然,品格','清澈如禾，生命力温和，读音流畅。','自然意象鲜明，简单易写。',88,[1,2]],
['月澄','yuè chéng','girl','古典诗意','明朗,自然','月色澄明，画面感强，柔和但不俗气。','取明月与澄澈之意。',92,[4,2]],
['昭月','zhāo yuè','girl','古典诗意','明朗,自然','明亮如月，音节清楚，气质明朗。','“昭”与“月”形成光明意象。',81,[1,4]],
['知夏','zhī xià','girl','现代简洁','智慧,自然','知性明朗，带季节感，轻盈但不过分网红化。','“知”增添理性，“夏”增添明亮。',84,[1,4]],
['怀谦','huái qiān','boy','温润儒雅','品格,智慧','有胸怀，也懂谦逊，气质成熟稳重。','寓意完整，适合不同成长阶段。',86,[2,1]],
['景川','jǐng chuān','boy','清朗自然','志向,自然','景致开阔、山川舒展，读起来明朗有力量。','自然意象组合，画面感开阔。',83,[3,1]],
['允修','yǔn xiū','boy','温润儒雅','品格,智慧','诚信自持、持续修养，内敛而不弱。','“允”与“修”形成品格线索。',90,[3,1]],
['和晏','hé yàn','neutral','温润儒雅','平安,品格','温和安宁，读音圆润，整体从容。','“晏”有安宁、晴朗之意。',91,[2,4]]
].map(x=>({n:x[0],p:x[1],g:x[2],style:x[3],m:x[4].split(','),d:x[5],src:x[6],rare:x[7],tones:x[8]}));
const surnameTones={林:2,王:2,李:3,张:1,吴:2,陈:2,杨:2,周:1,赵:4,刘:2,黄:2,徐:2,孙:1,胡:2,朱:1,高:1,何:2,郭:1,罗:2,梁:2,宋:4,郑:4,谢:4,韩:2,唐:2,冯:2,于:2,董:3,萧:1,程:2,曹:2,袁:2,邓:4,许:3,傅:4,沈:3,曾:1,彭:2,吕:3,苏:1,卢:2,蒋:3,蔡:4,贾:3,丁:1,魏:4,薛:1,叶:4,阎:2,余:2,潘:1,杜:4,戴:4,夏:4,钟:1,汪:1,田:2,任:4,姜:1,范:4,方:1,石:2,姚:2,谭:2,廖:4,邹:1,熊:2,金:1,陆:4,郝:3,孔:3,白:2,崔:1,康:1,毛:2,邱:1,秦:2,江:1,史:3,顾:4,侯:2,邵:4,孟:4,龙:2,万:4,段:4,雷:2,钱:2,汤:1,尹:3,黎:2,易:4,常:2,武:3,乔:2,贺:4,赖:4,龚:1,文:2};
const $=s=>document.querySelector(s);let seed=0;function makeChips(id,arr){$(id).innerHTML=arr.map((x,i)=>`<button class="chip ${i===0?'on':''}" data-v="${x}">${x}</button>`).join('');$(id).onclick=e=>{if(!e.target.classList.contains('chip'))return;[...$(id).children].forEach(x=>x.classList.remove('on'));e.target.classList.add('on')}}makeChips('#styles',['温润儒雅','清朗自然','大气稳重','现代简洁','古典诗意']);makeChips('#meanings',['智慧','平安','志向','品格','自然','明朗']);
function score(x,s,g,style,meaning){let st=surnameTones[s]||0;let tones=[st,...x.tones].filter(Boolean);let rhythm=new Set(tones).size;let adjacent=(tones[0]===tones[1]||tones[1]===tones[2])?-5:4;let gender=(g==='neutral'||x.g==='neutral'||x.g===g)?8:-20;let fit=(x.style===style?12:0)+(x.m.includes(meaning)?10:0);let beauty=100-Math.abs(82-x.rare)/2;return Math.round(Math.min(98,60+rhythm*4+adjacent+gender+fit+beauty/10))}
function render(){let s=$('#surname').value.trim()||'林',g=$('#gender').value,style=$('#styles .on').dataset.v,meaning=$('#meanings .on').dataset.v,avoid=$('#avoid').value.trim();let arr=pairs.filter(x=>!avoid.split('').some(c=>x.n.includes(c))).filter(x=>g==='neutral'||x.g==='neutral'||x.g===g).map(x=>({...x,score:score(x,s,g,style,meaning)})).sort((a,b)=>b.score-a.score);let offset=(seed++*6)%Math.max(1,arr.length);arr=[...arr.slice(offset),...arr.slice(0,offset)].slice(0,8);$('#summary').innerHTML=`<b>本轮先筛“好听”，再筛寓意</b><p style="margin:6px 0 0;color:#6e766f;line-height:1.6">已优先排除明显拗口、语义松散和像随机拼字的组合，再结合“${s}”姓、${style}与${meaning}进行排序。</p>`;$('#cards').innerHTML=arr.map(x=>`<article class="card"><div class="score">${x.score}</div><div class="name">${s}${x.n}</div><div class="meta">${x.p}</div><span class="tag">${x.style}</span>${x.m.map(m=>`<span class="tag">${m}</span>`).join('')}<div class="desc">${x.d}</div><div class="why">${x.src}</div></article>`).join('')}
$('#go').onclick=render;render();
</script></body></html>
