name: Test
permissions:
  contents: write
on:
  pull_request:
  push:
    branches: [main, feature/book-grounded-naming-v6]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run check
      - name: Commit generated standalone page
        if: github.event_name == 'push' && github.ref_name == 'feature/book-grounded-naming-v6'
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html already current"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "build: regenerate book-grounded naming page"
            git push
          fi
