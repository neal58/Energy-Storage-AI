name: Deploy management knowledge base

on:
  push:
    branches: [main]
    paths:
      - 'management-knowledge-base/**'
      - '.github/workflows/deploy-management-knowledge-base.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable GitHub Pages via API
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status=$(curl -sS -o /tmp/pages.json -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"build_type":"workflow"}')
          cat /tmp/pages.json || true
          if [ "$status" != "201" ] && [ "$status" != "409" ]; then
            echo "Unable to enable Pages. HTTP $status"
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: management-knowledge-base

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
