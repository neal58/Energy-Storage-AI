<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#081b3a">
<title>管理答辩知识库</title>
<style>
:root{--navy:#081b3a;--blue:#164e9b;--gold:#b97a18;--paper:#f7f3eb;--line:#d9e3f0;--muted:#637083;--shadow:0 18px 45px rgba(8,27,58,.12)}*{box-sizing:border-box}body{margin:0;font-family:"Microsoft YaHei","PingFang SC",system-ui,sans-serif;background:linear-gradient(145deg,#eef3f8,#faf7f0);color:var(--navy)}button,input{font:inherit}.app{min-height:100vh;display:grid;grid-template-columns:280px 1fr}.side{background:var(--navy);color:#fff;padding:32px 24px;position:sticky;top:0;height:100vh}.brand{font-size:25px;font-weight:900}.brand small{display:block;font-size:12px;color:#b8c7dc;margin-top:7px;font-weight:400}.nav{margin-top:40px}.nav button{display:block;width:100%;border:0;border-radius:14px;padding:14px 16px;margin:8px 0;text-align:left;background:transparent;color:#cbd7e8;cursor:pointer}.nav button.active,.nav button:hover{background:#18365f;color:#fff}.side-tip{position:absolute;bottom:26px;left:24px;right:24px;padding:15px;border:1px solid #315179;border-radius:14px;color:#cbd7e8;font-size:13px;line-height:1.7}main{padding:34px clamp(20px,5vw,70px) 70px}.hero{display:flex;gap:24px;justify-content:space-between;align-items:end;margin-bottom:28px}.hero h1{margin:0;font-size:clamp(30px,5vw,54px);line-height:1.12}.hero p{color:var(--muted);margin:12px 0 0}.stats{background:#fff;border-radius:18px;padding:18px 24px;box-shadow:var(--shadow);min-width:180px}.stats strong{font-size:30px}.stats span{display:block;color:var(--muted);font-size:13px;margin-top:4px}.toolbar{display:flex;gap:12px;flex-wrap:wrap;margin:24px 0}.search{flex:1;min-width:240px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 18px;outline:none}.filter{border:1px solid var(--line);background:#fff;border-radius:14px;padding:12px 16px;cursor:pointer}.filter.active{background:var(--navy);color:#fff}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:22px}.card{background:#fff;border:1px solid rgba(8,27,58,.08);border-radius:24px;padding:25px;box-shadow:0 10px 28px rgba(8,27,58,.08);transition:.2s;cursor:pointer;position:relative;overflow:hidden}.card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}.card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:linear-gradient(var(--blue),var(--gold))}.tag{display:inline-flex;padding:7px 11px;border-radius:999px;background:#edf4ff;color:var(--blue);font-size:12px;font-weight:700}.card h2{font-size:21px;margin:18px 0 10px;line-height:1.45}.card p{color:var(--muted);line-height:1.7}.formula{margin-top:18px;background:#fff7e8;border:1px solid #efd7ad;padding:13px 15px;border-radius:14px;color:#8c5910;font-weight:800}.empty{display:none;text-align:center;color:var(--muted);padding:70px 0}dialog{border:0;border-radius:26px;padding:0;width:min(760px,calc(100% - 28px));max-height:90vh;box-shadow:0 30px 80px rgba(0,0,0,.3)}dialog::backdrop{background:rgba(3,13,29,.72);backdrop-filter:blur(4px)}.modal{padding:30px;background:var(--paper);overflow:auto;max-height:90vh}.close{float:right;border:0;background:#fff;border-radius:50%;width:40px;height:40px;font-size:22px;cursor:pointer}.modal-title{padding-right:50px}.modal-title h2{font-size:clamp(25px,4vw,38px);margin:12px 0 18px}.memory{background:#fff1d6;border:1px solid #e7c27e;border-radius:18px;padding:17px;text-align:center;font-weight:900;color:#8b5609;font-size:clamp(18px,3vw,25px);margin-bottom:18px}.section{background:#fff;border-radius:18px;padding:20px;margin:14px 0;border:1px solid #e5ebf3}.section h3{margin:0 0 9px;font-size:21px}.section p{margin:0;color:#3d4858;line-height:1.8}.steps{display:grid;gap:10px}.step{padding:13px 15px;border-radius:12px;background:#f4f1fb;color:#3d3856;line-height:1.65}.takeaway{background:var(--navy);color:#fff;border-radius:18px;padding:19px;margin-top:16px;line-height:1.8;font-weight:700}@media(max-width:760px){.app{display:block}.side{height:auto;position:relative;padding:20px}.nav{display:flex;overflow:auto;margin-top:18px}.nav button{white-space:nowrap;width:auto}.side-tip{display:none}main{padding:24px 16px 50px}.hero{align-items:start;flex-direction:column}.stats{width:100%}.grid{grid-template-columns:1fr}.card{padding:22px}.modal{padding:22px}}
</style></head>
<body><div class="app"><aside class="side"><div class="brand">管理答辩知识库<small>每天学一张，回答更有逻辑</small></div><nav class="nav"><button class="active" data-cat="全部">全部卡片</button><button data-cat="团队管理">团队管理</button><button data-cat="绩效管理">绩效管理</button><button data-cat="沟通协调">沟通协调</button><button data-cat="风险决策">风险决策</button></nav><div class="side-tip">核心答题结构：<br><b>观点 → 原则 → 措施 → 升华</b></div></aside><main><section class="hero"><div><h1>把管理经验，<br>变成随时能用的答案。</h1><p>搜索问题、查看口诀、反复练习，逐步形成自己的管理表达体系。</p></div><div class="stats"><strong id="count">1</strong><span>张知识卡</span></div></section><div class="toolbar"><input id="search" class="search" placeholder="搜索题目、关键词或口诀……"><button class="filter active" data-cat="全部">全部</button><button class="filter" data-cat="团队管理">团队管理</button></div><section class="grid" id="grid"></section><div class="empty" id="empty">没有找到匹配的知识卡</div></main></div><dialog id="dialog"><article class="modal" id="modal"></article></dialog>
<script>
const cards=[{id:'strong-employee',category:'团队管理',title:'团队里有能力特别强的员工，你会怎么管理？',summary:'发挥个人优势，把个人能力转化成团队能力，同时通过机制降低个人依赖。',formula:'观 → 则 → 用 → 育 → 制 → 升',sections:[['观点','能力强的员工是团队最宝贵的资源，但不能只依赖个人。'],['原则','充分发挥个人优势，同时把个人能力转化为团队能力。'],['三项措施',['① 用：安排重点工作、关键项目，充分发挥优势。','② 育：参与经验分享、标准制定、新人培养，带动团队成长。','③ 制：通过标准化、流程化、信息化固化经验，降低对个人依赖。']],['升华','优秀管理者的目标，不是培养个人英雄，而是打造一支能力强、可持续运转的团队。']],answer:'我认为，能力强的员工是团队最宝贵的资源，但优秀员工不是用来依赖的，而是用来带动整个团队成长的。我的管理原则是：充分发挥个人优势，同时把个人能力转化为团队能力，避免团队过度依赖某一个人。第一，我会根据他的专业特长，让他承担重点工作、关键项目或者改善任务，充分发挥他的价值。第二，我会发挥他的示范带动作用，让他参与经验分享、标准制定和新人培养，通过传帮带把个人经验转化为团队经验。第三，我会通过标准化、流程化和信息化，把关键经验固化下来，降低业务对个人的依赖。我始终认为，一个优秀管理者的价值，不是培养一个个人英雄，而是打造一支能力强、可持续运转的团队。'}];
let category='全部';const grid=document.querySelector('#grid'),search=document.querySelector('#search'),dialog=document.querySelector('#dialog'),modal=document.querySelector('#modal');function render(){const q=search.value.trim().toLowerCase();const list=cards.filter(c=>(category==='全部'||c.category===category)&&[c.title,c.summary,c.formula,c.answer].join(' ').toLowerCase().includes(q));grid.innerHTML=list.map(c=>`<article class="card" data-id="${c.id}"><span class="tag">${c.category}</span><h2>${c.title}</h2><p>${c.summary}</p><div class="formula">记忆口诀：${c.formula}</div></article>`).join('');document.querySelector('#empty').style.display=list.length?'none':'block';document.querySelector('#count').textContent=cards.length;grid.querySelectorAll('.card').forEach(el=>el.onclick=()=>openCard(el.dataset.id))}function openCard(id){const c=cards.find(x=>x.id===id);modal.innerHTML=`<button class="close" aria-label="关闭">×</button><div class="modal-title"><span class="tag">${c.category}</span><h2>${c.title}</h2></div><div class="memory">记忆口诀：${c.formula}</div>${c.sections.map(([t,v])=>`<section class="section"><h3>${t}</h3>${Array.isArray(v)?`<div class="steps">${v.map(x=>`<div class="step">${x}</div>`).join('')}</div>`:`<p>${v}</p>`}</section>`).join('')}<div class="takeaway">完整回答：<br>${c.answer}</div>`;modal.querySelector('.close').onclick=()=>dialog.close();dialog.showModal()}document.querySelectorAll('[data-cat]').forEach(btn=>btn.onclick=()=>{category=btn.dataset.cat;document.querySelectorAll('[data-cat]').forEach(x=>x.classList.toggle('active',x.dataset.cat===category));render()});search.oninput=render;dialog.onclick=e=>{if(e.target===dialog)dialog.close()};render();
</script></body></html>
